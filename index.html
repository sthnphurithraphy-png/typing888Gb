<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Language Typing Pro ⌨️🌍</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/3242/3242202.png">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-storage-compat.js"></script>
    
    <style>
        :root {
            --primary: #2dd4bf;
            --secondary: #fb7185;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f1f5f9;
            --text-dim: #64748b;
            --input-bg: #020617;
            --xp-color: #3b82f6;
            --accent: #a855f7;
            --border: rgba(255,255,255,0.1);
        }

        body.light-theme {
            --primary: #0d9488;
            --secondary: #e11d48;
            --bg: #f1f5f9;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-dim: #64748b;
            --input-bg: #f8fafc;
            --xp-color: #2563eb;
            --accent: #7c3aed;
            --border: rgba(0,0,0,0.1);
        }
        
        body { font-family: 'Inter', 'Kanit', sans-serif; background: var(--bg); color: var(--text-main); margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; transition: background 0.3s, color 0.3s; overflow-x: hidden; }
        .container { width: 100%; max-width: 850px; padding: 20px; }
        .card { background: var(--card-bg); border-radius: 28px; padding: 40px; border: 1px solid var(--border); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.2); position: relative; }

        .top-controls { position: absolute; top: 20px; right: 20px; display: flex; gap: 10px; z-index: 10; }
        .icon-btn { cursor: pointer; font-size: 18px; background: var(--input-bg); border: 1px solid var(--border); padding: 8px; border-radius: 12px; transition: 0.2s; }
        .icon-btn:hover { border-color: var(--primary); }

        .mode-selector { display: flex; background: var(--input-bg); padding: 5px; border-radius: 16px; margin-bottom: 15px; border: 1px solid var(--border); gap: 5px; }
        .mode-btn { flex: 1; padding: 10px; border-radius: 12px; cursor: pointer; text-align: center; font-weight: 700; transition: 0.3s; color: var(--text-dim); font-size: 14px; }
        .mode-btn.active { background: var(--primary); color: white; box-shadow: 0 4px 15px rgba(45, 212, 191, 0.3); }

        .profile-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: rgba(0,0,0,0.05); padding: 12px 20px; border-radius: 24px; border: 1px solid var(--border); }
        .avatar-container { position: relative; width: 50px; height: 50px; }
        .user-avatar { width: 100%; height: 100%; border-radius: 14px; object-fit: cover; border: 2px solid var(--primary); background: var(--input-bg); }
        .lvl-badge { position: absolute; bottom: -5px; right: -5px; background: var(--xp-color); color: white; font-size: 10px; font-weight: 900; padding: 1px 6px; border-radius: 6px; border: 2px solid var(--card-bg); }
        
        .xp-info { flex-grow: 1; margin: 0 15px; }
        .xp-bar-bg { width: 100%; height: 8px; background: var(--input-bg); border-radius: 10px; margin-top: 5px; overflow: hidden; border: 1px solid var(--border); }
        .xp-bar-fill { height: 100%; background: linear-gradient(90deg, var(--xp-color), var(--primary)); width: 0%; transition: width 0.6s ease; }

        .stats-panel { position: relative; display: flex; justify-content: space-around; margin-bottom: 15px; background: rgba(0,0,0,0.05); padding: 12px; border-radius: 20px; border: 1px solid var(--border); }
        .hide-stats-btn { position: absolute; top: 5px; right: 8px; font-size: 14px; cursor: pointer; opacity: 0.5; transition: 0.2s; }
        .hide-stats-btn:hover { opacity: 1; color: var(--primary); }

        .word-display-container { font-size: 28px; padding: 25px; background: var(--input-bg); border-radius: 22px; margin-bottom: 20px; height: 100px; overflow: hidden; border: 2px solid var(--border); position: relative; line-height: 1.5; user-select: none; }
        #word-list-wrapper { display: flex; flex-wrap: wrap; gap: 10px 20px; transition: transform 0.2s ease; align-content: flex-start; position: relative; }
        
        .word { color: var(--text-dim); transition: 0.1s; white-space: nowrap; border-radius: 4px; padding: 0 4px; }
        .word.active { color: var(--text-main); background: rgba(255,255,255,0.1); box-shadow: 0 2px 0 var(--primary); }
        .word.correct { color: var(--primary); }
        .word.incorrect { color: var(--secondary); text-decoration: underline; }
        
        .input-area { position: relative; display: flex; gap: 10px; }
        #typing-input { flex: 1; padding: 18px; background: var(--input-bg); border: 2px solid var(--border); border-radius: 18px; font-size: 22px; color: var(--text-main); outline: none; transition: 0.3s; font-family: 'Kanit'; }
        #typing-input:focus { border-color: var(--primary); box-shadow: 0 0 20px rgba(45, 212, 191, 0.1); }
        
        .reset-btn { width: 60px; background: var(--card-bg); border: 2px solid var(--border); border-radius: 18px; color: var(--text-dim); font-size: 24px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; }
        .reset-btn:hover { border-color: var(--primary); color: var(--primary); transform: rotate(15deg); }

        .stats-nav { display: flex; gap: 10px; margin-top: 20px; }
        .stats-btn { flex: 1; padding: 12px; border-radius: 14px; background: rgba(0,0,0,0.05); border: 1px solid var(--border); color: var(--text-main); cursor: pointer; font-weight: 600; font-size: 13px; }
        .stats-btn:hover { background: var(--input-bg); border-color: var(--primary); }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; justify-content: center; align-items: center; z-index: 1000; padding: 20px; backdrop-filter: blur(8px); }
        .modal-content { background: var(--card-bg); padding: 35px; border-radius: 30px; width: 100%; max-width: 500px; text-align: center; border: 1px solid var(--primary); color: var(--text-main); }
        
        .hidden { display: none !important; }
        .invisible-stat { visibility: hidden !important; }

        .std-input { width: 100%; padding: 14px; background: var(--input-bg); border: 1px solid var(--border); border-radius: 12px; color: var(--text-main); margin-bottom: 15px; box-sizing: border-box; }
        
        #leaderboard-list { margin-top: 15px; background: rgba(0,0,0,0.05); border-radius: 20px; max-height: 350px; overflow-y: auto; border: 1px solid var(--border); }
        .rank-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; border-bottom: 1px solid var(--border); }
        .rank-info { display: flex; align-items: center; gap: 12px; }
        .rank-avatar { width: 35px; height: 35px; border-radius: 8px; border: 1px solid var(--primary); object-fit: cover; }
        .rank-lvl { font-size: 10px; background: var(--xp-color); color: white; padding: 2px 5px; border-radius: 4px; font-weight: 800; margin-left: 5px; }

        .best-record-card { background: linear-gradient(135deg, var(--card-bg), #1e1b4b); border: 1px solid var(--primary); border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        .best-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .best-box { background: rgba(0,0,0,0.2); padding: 10px; border-radius: 12px; }

        button { border: none; padding: 12px 20px; border-radius: 12px; cursor: pointer; font-weight: 700; transition: 0.2s; font-family: 'Kanit'; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-primary { background: var(--primary); color: white; width: 100%; }
        .btn-ghost { background: var(--input-bg); color: var(--text-dim); border: 1px solid var(--border); }

        .settings-avatar-edit { position: relative; width: 100px; height: 100px; margin: 0 auto 20px; cursor: pointer; }
        .avatar-preview { width: 100px; height: 100px; border-radius: 20px; border: 3px solid var(--primary); object-fit: cover; }
        .upload-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.4); border-radius: 20px; display: flex; align-items: center; justify-content: center; opacity: 0; transition: 0.2s; color: white; font-size: 20px; }
        .settings-avatar-edit:hover .upload-overlay { opacity: 1; }
        .rand-avatar-btn { position: absolute; bottom: -5px; right: -5px; background: var(--primary); color: white; border-radius: 50%; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid var(--card-bg); z-index: 5; }
    </style>
</head>
<body>

    <div class="container">
        <div id="auth-ui" class="card">
            <h2 style="text-align: center; margin-bottom: 30px;">🌍 TYPING WORLD RACE</h2>
            <input type="text" id="login-user" class="std-input" placeholder="ชื่อผู้ใช้">
            <input type="password" id="login-pass" class="std-input" placeholder="รหัสผ่าน (6 ตัวขึ้นไป)">
            <div style="display: flex; gap: 15px;">
                <button class="btn-ghost" style="flex: 1;" onclick="handleAuth('up')">สมัครใหม่</button>
                <button class="btn-primary" style="flex: 2;" onclick="handleAuth('in')">เข้าสู่ระบบ</button>
            </div>
        </div>

        <div id="game-ui" class="card hidden">
            <div class="top-controls">
                <div class="icon-btn" onclick="openSettings()">⚙️</div>
                <div class="icon-btn" onclick="toggleTheme()">🌓</div>
            </div>
            
            <div class="profile-bar">
                <div class="avatar-container">
                    <img id="display-avatar" class="user-avatar" src="">
                    <div id="display-lvl-badge" class="lvl-badge">LV.1</div>
                </div>
                <div class="xp-info">
                    <div id="display-name" style="font-weight: 800; font-size: 15px; color: var(--primary);">Loading...</div>
                    <div class="xp-bar-bg"><div id="xp-fill" class="xp-bar-fill"></div></div>
                    <div style="font-size: 10px; color: var(--text-dim); margin-top: 2px;" id="xp-text">0 / 2000 XP</div>
                </div>
                <button class="btn-ghost" style="padding: 8px 12px;" onclick="auth.signOut()">🚪</button>
            </div>

            <div class="mode-selector">
                <div class="mode-btn active" id="mode-th" onclick="switchMode('th')">🇹🇭 THAI</div>
                <div class="mode-btn" id="mode-en" onclick="switchMode('en')">🇺🇸 ENGLISH</div>
            </div>

            <div class="stats-panel">
                <div class="hide-stats-btn" onclick="toggleStatsVisibility()">👁️</div>
                <div class="stat-item" style="text-align:center"><small style="color:var(--text-dim)">TIME</small><div id="timer" style="font-size: 24px; font-weight: 800; color:var(--secondary)">60s</div></div>
                <div class="stat-item" style="text-align:center"><small style="color:var(--text-dim)">WPM</small><div id="wpm-live" style="font-size: 24px; font-weight: 800; color:var(--primary)">0</div></div>
                <div class="stat-item" style="text-align:center"><small style="color:var(--text-dim)">WRONG</small><div id="wrong-live" style="font-size: 24px; font-weight: 800; color:var(--secondary)">0</div></div>
            </div>

            <div class="word-display-container" id="display-box">
                <div id="word-list-wrapper"></div>
            </div>
            
            <div class="input-area">
                <input type="text" id="typing-input" placeholder="เริ่มพิมพ์เพื่อเริ่มเกม..." autocomplete="off">
                <button class="reset-btn" onclick="resetGame()">↻</button>
            </div>

            <div class="stats-nav">
                <button class="stats-btn" onclick="openBestModal()">📊 สถิติสูงสุดของฉัน</button>
                <button class="stats-btn" onclick="openLeaderboard()">🏆 อันดับโลกโหมดนี้</button>
            </div>
        </div>
    </div>

    <div id="settings-modal" class="modal hidden">
        <div class="modal-content">
            <h3>⚙️ ตั้งค่าโปรไฟล์</h3>
            <div class="settings-avatar-edit" onclick="document.getElementById('avatar-file').click()">
                <img id="settings-avatar-preview" class="avatar-preview" src="">
                <div class="upload-overlay">📷</div>
                <div class="rand-avatar-btn" onclick="event.stopPropagation(); randomizeAvatar()">🎲</div>
            </div>
            <input type="file" id="avatar-file" hidden accept="image/*" onchange="previewFile()">
            
            <input type="text" id="settings-name-input" class="std-input" placeholder="เปลี่ยนชื่อของคุณ">
            <div style="display: flex; gap: 10px;">
                <button class="btn-ghost" style="flex: 1;" onclick="toggleModal('settings-modal', false)">ยกเลิก</button>
                <button id="save-settings-btn" class="btn-primary" style="flex: 2;" onclick="handleSettingsSave()">บันทึกการเปลี่ยน</button>
            </div>
        </div>
    </div>

    <div id="leaderboard-modal" class="modal hidden"><div class="modal-content"><h3 id="lb-title">🏆 TOP 100</h3><div id="leaderboard-list"></div><button class="btn-primary" style="margin-top:20px" onclick="toggleModal('leaderboard-modal', false)">ปิดหน้าต่าง</button></div></div>
    <div id="best-modal" class="modal hidden"><div class="modal-content"><h3>📊 สถิติสูงสุดตลอดกาล</h3><div class="best-record-card"><div style="color:var(--primary); font-weight: 800;">🇹🇭 ภาษาไทย</div><div class="best-grid"><div class="best-box"><small>WPM</small><div id="best-th-wpm" style="font-size:20px">0</div></div><div class="best-box"><small>ความแม่นยำ</small><div id="best-th-acc" style="font-size:20px">0%</div></div></div></div><div class="best-record-card" style="border-color: #a855f7;"><div style="color:#a855f7; font-weight: 800;">🇺🇸 ภาษาอังกฤษ</div><div class="best-grid"><div class="best-box"><small>WPM</small><div id="best-en-wpm" style="font-size:20px">0</div></div><div class="best-box"><small>ความแม่นยำ</small><div id="best-en-acc" style="font-size:20px">0%</div></div></div></div><button class="btn-primary" onclick="toggleModal('best-modal', false)">กลับไปฝึกซ้อม</button></div></div>
    <div id="result-modal" class="modal hidden"><div class="modal-content"><h2 style="color: var(--primary); margin-bottom: 5px;">FINISHED! 🏁</h2><div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0;"><div style="background: rgba(0,0,0,0.05); padding:15px; border-radius:15px;"><small>ความเร็ว</small><div id="res-wpm" style="font-size: 28px; font-weight: 800; color: var(--primary);">0</div>WPM</div><div style="background: rgba(0,0,0,0.05); padding:15px; border-radius:15px;"><small>ความแม่นยำ</small><div id="res-acc" style="font-size: 28px; font-weight: 800; color: #eab308;">0%</div></div></div><div id="xp-gain-text" style="font-size: 24px; font-weight: 900; color: var(--xp-color); margin-bottom: 20px;">+0 EXP</div><button class="btn-primary" onclick="closeResult()">ฝึกใหม่อีกครั้ง</button></div></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC4lXsegdu_1H9coMKQNiPWj3Bg2sPxT-0",
            authDomain: "thaityping-5b95f.firebaseapp.com",
            projectId: "thaityping-5b95f",
            storageBucket: "thaityping-5b95f.appspot.com", // แก้ไขให้ถูกต้องตามโปรเจกต์
            messagingSenderId: "870492285903",
            appId: "1:870492285903:web:c85e1c878b6dc699f600ba"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.firestore(), storage = firebase.storage();

        const dict = {
            th: ["กิน", "นอน", "เดิน", "วิ่ง", "ดู", "มา", "ไป", "ดี", "ใจ", "มือ", "ตา", "หู", "น้ำ", "รัก", "บ้าน", "รถ", "คน", "มด", "เรียน", "เล่น", "สวย", "รวย", "เรา", "เธอ", "เขา", "ใน", "นอก", "แปรง", "เขียน", "อ่าน", "ฟัง", "ชาม", "แก้ว", "จาน", "ดิน", "ลม", "ฝน", "ฟ้า", "ขาว", "ดำ", "แดง", "เขียว", "ทอง", "เงิน", "งาน", "พัก", "ผ่อน", "ยิ้ม", "หมู", "หมา", "แมว", "ม้า", "ปลา", "ไม้", "ไก่", "ไข่", "น้า", "อา", "ป้า", "ลุง", "แม่", "พ่อ", "พี่", "น้อง", "คุณ", "แขน", "ขา", "เอว", "ท้อง", "ฟัน", "ปาก", "จมูก", "แก้ม", "ผม", "ทำงาน", "ขยัน", "ร่าเริง", "สดใส", "ต้นไม้", "ภูเขา", "ทะเล", "อาหาร", "ขนม", "สะอาด", "ท้องฟ้า", "กะเพรา", "มะม่วง", "ปากกา", "สมุด", "ดินสอ", "เก้าอี้", "รองเท้า", "ถุงเท้า", "นาฬิกา", "มือถือ", "น้ำหวาน", "กาแฟ", "ส้มตำ", "โรงเรียน", "ตลาด", "ความสุข", "จริงใจ", "อดทน", "ใจดี", "ก้าวหน้า", "ชีวิต"],
            en: ["the", "quick", "brown", "fox", "jumps", "over", "lazy", "dog", "work", "play", "love", "game", "fire", "water", "earth", "wind", "blue", "red", "green", "bird", "fish", "small", "large", "ready", "start", "code", "best", "cool", "now", "here", "there", "some", "more", "last", "next", "page", "text", "font", "size", "dark", "light", "home", "back", "show", "hide", "save", "edit", "user", "name", "pass", "file", "web", "app", "site", "link", "bold", "time", "date", "year", "day", "way", "car", "bus", "ship", "road", "sky", "moon", "star", "sun", "tree", "leaf", "root", "seed", "wall", "door", "room", "key", "box", "bag", "cup", "pen", "book", "boy", "girl", "man", "kid", "son", "old", "new", "low", "high", "active", "bright", "forest", "mountain", "ocean", "happy", "dinner", "morning", "evening", "flower", "winter", "summer", "weather", "stable", "school", "office", "laptop", "mobile", "coffee", "sugar", "market", "leader", "member", "people", "future"]
        };

        let currentMode = 'th', timer = null, timeLeft = 60, isPlaying = false, gameStarted = false;
        let correctWords = 0, wrongWords = 0, currentWordIndex = 0, gameWords = [], userXP = 0;
        let myBest = { th: { wpm: 0, acc: 0 }, en: { wpm: 0, acc: 0 } };
        let selectedFile = null;

        // Level System
        function getLevel(xp) { return Math.floor(Math.sqrt(xp / 500)) + 1; }
        function getXPForLevel(lvl) { return Math.pow(lvl - 1, 2) * 500; }

        // --- เพิ่มฟังก์ชันจัดการรูปภาพ ---
        function previewFile() {
            const file = document.getElementById('avatar-file').files[0];
            if (file) {
                if (file.size > 2 * 1024 * 1024) return alert("ขนาดรูปต้องไม่เกิน 2MB");
                selectedFile = file;
                const reader = new FileReader();
                reader.onload = (e) => document.getElementById('settings-avatar-preview').src = e.target.result;
                reader.readAsDataURL(file);
            }
        }

        async function handleSettingsSave() {
            const user = auth.currentUser;
            const newName = document.getElementById('settings-name-input').value.trim();
            const saveBtn = document.getElementById('save-settings-btn');
            
            if(newName.length < 2) return alert("ชื่อสั้นเกินไป");
            
            try {
                saveBtn.disabled = true;
                saveBtn.innerText = "กำลังอัปโหลด...";
                
                let photoUrl = document.getElementById('settings-avatar-preview').src;

                // อัปโหลดไฟล์ไปที่ Firebase Storage ถ้ามีการเลือกรูปใหม่
                if (selectedFile) {
                    const storageRef = storage.ref(`avatars/${user.uid}`);
                    const uploadTask = await storageRef.put(selectedFile);
                    photoUrl = await uploadTask.ref.getDownloadURL();
                }

                // อัปเดตข้อมูลใน Firestore
                await db.collection("users").doc(user.uid).update({ name: newName, photo: photoUrl });

                // Sync ไปที่ Leaderboards
                const batch = db.batch();
                const lbThRef = db.collection("leaderboard_th").doc(user.uid);
                const lbEnRef = db.collection("leaderboard_en").doc(user.uid);
                
                const snapTh = await lbThRef.get();
                if(snapTh.exists) batch.update(lbThRef, { name: newName, photo: photoUrl });
                const snapEn = await lbEnRef.get();
                if(snapEn.exists) batch.update(lbEnRef, { name: newName, photo: photoUrl });
                
                await batch.commit();
                
                selectedFile = null;
                updateUIFromDB(user);
                toggleModal('settings-modal', false);
                alert("บันทึกเรียบร้อย!");
            } catch(e) { 
                console.error(e);
                alert("เกิดข้อผิดพลาดในการบันทึก"); 
            } finally {
                saveBtn.disabled = false;
                saveBtn.innerText = "บันทึกการเปลี่ยน";
            }
        }
        // -----------------------------

        function toggleTheme() {
            document.body.classList.toggle('light-theme');
            localStorage.setItem('theme', document.body.classList.contains('light-theme') ? 'light' : 'dark');
        }
        if (localStorage.getItem('theme') === 'light') document.body.classList.add('light-theme');

        function toggleStatsVisibility() {
            const items = document.querySelectorAll('.stat-item');
            const btn = document.querySelector('.hide-stats-btn');
            const isHidden = items[0].classList.contains('invisible-stat');
            items.forEach(item => item.classList.toggle('invisible-stat'));
            btn.innerText = isHidden ? '👁️' : '🔒';
        }

        function toggleModal(id, show) { document.getElementById(id).classList.toggle('hidden', !show); }

        function generateWords() {
            gameWords = [];
            for(let i=0; i<300; i++) gameWords.push(dict[currentMode][Math.floor(Math.random() * dict[currentMode].length)]);
            const wrapper = document.getElementById('word-list-wrapper');
            wrapper.innerHTML = gameWords.map((w, i) => `<span class="word" id="w-${i}">${w}</span>`).join('');
            wrapper.style.transform = `translateY(0px)`;
            updateHighlight();
        }

        function resetGame() {
            clearInterval(timer);
            timer = null; isPlaying = false; gameStarted = false; timeLeft = 60;
            correctWords = 0; wrongWords = 0; currentWordIndex = 0;
            document.getElementById('timer').innerText = "60s";
            document.getElementById('wpm-live').innerText = "0";
            document.getElementById('wrong-live').innerText = "0";
            document.getElementById('typing-input').value = "";
            document.getElementById('typing-input').focus();
            generateWords();
        }

        function startTimer() {
            gameStarted = true; isPlaying = true;
            timer = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft + "s";
                if(timeLeft <= 0) endGame();
            }, 1000); 
        }

        document.getElementById('typing-input').addEventListener('input', (e) => {
            if(!gameStarted && e.target.value.length > 0) startTimer();
            if(e.target.value.endsWith(' ')) {
                const typed = e.target.value.trim();
                if(typed === "") { e.target.value = ''; return; }
                const el = document.getElementById(`w-${currentWordIndex}`);
                if(typed === gameWords[currentWordIndex]) {
                    correctWords++; el.classList.add('correct');
                } else {
                    wrongWords++; el.classList.add('incorrect');
                }
                currentWordIndex++;
                document.getElementById('wpm-live').innerText = correctWords;
                document.getElementById('wrong-live').innerText = wrongWords;
                e.target.value = '';
                updateHighlight();
            }
        });

        function updateHighlight() {
            document.querySelectorAll('.word').forEach(el => el.classList.remove('active'));
            const cur = document.getElementById(`w-${currentWordIndex}`);
            if(cur) {
                cur.classList.add('active');
                const wrapper = document.getElementById('word-list-wrapper');
                if (cur.offsetTop > 40) wrapper.style.transform = `translateY(-${cur.offsetTop - 10}px)`;
            }
        }

        async function endGame() {
            isPlaying = false; clearInterval(timer);
            const total = correctWords + wrongWords;
            const accuracy = total > 0 ? Math.round((correctWords / total) * 100) : 0;
            const xpGain = Math.max(1, Math.round((correctWords * (accuracy/100)) * 0.5));

            document.getElementById('res-wpm').innerText = correctWords;
            document.getElementById('res-acc').innerText = accuracy + "%";
            document.getElementById('xp-gain-text').innerText = `+${xpGain} EXP`;
            toggleModal('result-modal', true);

            const user = auth.currentUser;
            if(user) {
                const userDoc = await db.collection("users").doc(user.uid).get();
                const userData = userDoc.data();
                
                if(correctWords > myBest[currentMode].wpm) {
                    myBest[currentMode] = { wpm: correctWords, acc: accuracy };
                    await db.collection("users").doc(user.uid).set({ best: myBest }, { merge: true });
                }
                
                const newXP = (userData.xp || 0) + xpGain;
                await db.collection("users").doc(user.uid).update({ xp: newXP });
                
                // Update Leaderboard
                await db.collection(`leaderboard_${currentMode}`).doc(user.uid).set({
                    name: userData.name,
                    wpm: Math.max(correctWords, (await db.collection(`leaderboard_${currentMode}`).doc(user.uid).get()).data()?.wpm || 0),
                    xp: newXP,
                    photo: userData.photo
                }, { merge: true });
                
                updateUIFromDB(user);
            }
        }

        async function updateUIFromDB(user) {
            const doc = await db.collection("users").doc(user.uid).get();
            const data = doc.data() || {};
            userXP = data.xp || 0;
            myBest = data.best || { th: { wpm: 0, acc: 0 }, en: { wpm: 0, acc: 0 } };
            
            const avatarUrl = data.photo || `https://api.dicebear.com/7.x/bottts/svg?seed=${user.uid}`;
            document.getElementById('display-name').innerText = data.name || "User";
            document.getElementById('display-avatar').src = avatarUrl;
            
            const lv = getLevel(userXP);
            const currentLevelXP = getXPForLevel(lv);
            const nextLevelXP = getXPForLevel(lv + 1);
            const progressPercent = Math.min(100, ((userXP - currentLevelXP) / (nextLevelXP - currentLevelXP)) * 100);

            document.getElementById('display-lvl-badge').innerText = `LV.${lv}`;
            document.getElementById('xp-fill').style.width = `${progressPercent}%`;
            document.getElementById('xp-text').innerText = `${Math.floor(userXP)} / ${nextLevelXP} XP`;
        }

        function openSettings() {
            const user = auth.currentUser;
            if(!user) return;
            document.getElementById('settings-name-input').value = document.getElementById('display-name').innerText;
            document.getElementById('settings-avatar-preview').src = document.getElementById('display-avatar').src;
            selectedFile = null;
            toggleModal('settings-modal', true);
        }

        function randomizeAvatar() {
            selectedFile = null; // ยกเลิกการเลือกไฟล์ถ้าสุ่มใหม่
            const randSeed = Math.random().toString(36).substring(7);
            document.getElementById('settings-avatar-preview').src = `https://api.dicebear.com/7.x/bottts/svg?seed=${randSeed}`;
        }

        function switchMode(mode) {
            if(isPlaying) return;
            currentMode = mode;
            document.getElementById('mode-th').classList.toggle('active', mode === 'th');
            document.getElementById('mode-en').classList.toggle('active', mode === 'en');
            resetGame();
        }

        function openBestModal() {
            document.getElementById('best-th-wpm').innerText = myBest.th.wpm;
            document.getElementById('best-th-acc').innerText = myBest.th.acc + "%";
            document.getElementById('best-en-wpm').innerText = myBest.en.wpm;
            document.getElementById('best-en-acc').innerText = myBest.en.acc + "%";
            toggleModal('best-modal', true);
        }

        async function openLeaderboard() {
            toggleModal('leaderboard-modal', true);
            document.getElementById('leaderboard-list').innerHTML = '<div style="padding:20px;">กำลังโหลด...</div>';
            document.getElementById('lb-title').innerText = `🏆 TOP 100 (${currentMode === 'th' ? 'ภาษาไทย' : 'ภาษาอังกฤษ'})`;
            const snap = await db.collection(`leaderboard_${currentMode}`).orderBy("wpm", "desc").limit(100).get();
            let html = '';
            let i = 1;
            snap.forEach(doc => {
                const d = doc.data();
                const lv = getLevel(d.xp || 0);
                html += `<div class="rank-item"><div class="rank-info"><span style="width: 25px; font-weight: bold;">${i++}.</span><img class="rank-avatar" src="${d.photo || 'https://api.dicebear.com/7.x/bottts/svg?seed='+i}"><div style="text-align: left;"><div style="font-weight: 700; font-size: 14px;">${d.name} <span class="rank-lvl">LV.${lv}</span></div></div></div><div style="font-weight: 800; color: var(--primary);">${d.wpm} <small>WPM</small></div></div>`;
            });
            document.getElementById('leaderboard-list').innerHTML = html || '<div style="padding:20px;">ยังไม่มีข้อมูลอันดับ</div>';
        }

        window.addEventListener('keydown', (e) => { if(e.key === 'Escape') resetGame(); });

        auth.onAuthStateChanged(user => {
            if(user) {
                toggleModal('auth-ui', false);
                document.getElementById('game-ui').classList.remove('hidden');
                updateUIFromDB(user);
                resetGame();
            } else {
                toggleModal('auth-ui', true);
                document.getElementById('game-ui').classList.add('hidden');
            }
        });

        async function handleAuth(type) {
            const u = document.getElementById('login-user').value.trim();
            const p = document.getElementById('login-pass').value;
            if(u.length < 2 || p.length < 6) return alert("ชื่อผู้ใช้ 2 ตัวขึ้นไป และรหัสผ่าน 6 ตัวขึ้นไป");
            const email = btoa(unescape(encodeURIComponent(u))).substring(0,15).replace(/=/g, "") + "@typing.com";
            try {
                if(type === 'up') {
                    const res = await auth.createUserWithEmailAndPassword(email, p);
                    const photo = `https://api.dicebear.com/7.x/bottts/svg?seed=${res.user.uid}`;
                    await db.collection("users").doc(res.user.uid).set({ name: u, xp: 0, photo: photo, best: { th:{wpm:0,acc:0}, en:{wpm:0,acc:0} } });
                } else { await auth.signInWithEmailAndPassword(email, p); }
            } catch(e) { alert("ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง"); }
        }

        function closeResult() { toggleModal('result-modal', false); resetGame(); }
    </script>
</body>
</html>
