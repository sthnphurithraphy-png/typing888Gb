<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thai Typing Pro - Master ⌨️⚡</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    
    <style>
        :root {
            --primary: #2dd4bf;
            --secondary: #fb7185;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f1f5f9;
            --text-dim: #64748b;
            --input-bg: #020617;
        }
        
        body { 
            font-family: 'Inter', 'Kanit', sans-serif; 
            background: var(--bg); 
            color: var(--text-main); 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
        }

        .container { width: 100%; max-width: 700px; padding: 20px; }
        .card { 
            background: var(--card-bg); 
            border-radius: 28px; 
            padding: 40px; 
            border: 1px solid rgba(255,255,255,0.05); 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); 
        }

        .profile-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; background: rgba(0,0,0,0.2); padding: 12px 20px; border-radius: 20px; }
        .user-avatar { width: 45px; height: 45px; border-radius: 12px; object-fit: cover; border: 2px solid var(--primary); background: var(--input-bg); }

        .word-display-container { 
            font-size: 28px; 
            padding: 15px 25px; 
            background: var(--input-bg); 
            border-radius: 20px; 
            margin: 20px 0; 
            height: 95px; 
            overflow: hidden; 
            border: 2px solid #334155;
            position: relative;
        }
        
        #word-list-wrapper { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 10px 20px; 
            transition: transform 0.2s ease-out;
            align-content: flex-start;
        }

        .word { color: var(--text-dim); transition: 0.2s; }
        .word.active { color: var(--text-main); border-bottom: 3px solid var(--primary); }
        .word.correct { color: var(--primary); }
        .word.incorrect { color: var(--secondary); text-decoration: line-through; }
        
        #typing-input { 
            width: 100%; padding: 20px; background: var(--input-bg); border: 2px solid #334155; 
            border-radius: 18px; font-size: 24px; color: white; outline: none; text-align: center; box-sizing: border-box; 
        }
        #typing-input:focus { border-color: var(--primary); box-shadow: 0 0 20px rgba(45, 212, 191, 0.1); }

        button { border: none; padding: 14px 28px; border-radius: 14px; cursor: pointer; font-weight: 700; transition: 0.2s; font-family: 'Kanit'; }
        .btn-primary { background: var(--primary); color: var(--bg); width: 100%; margin-top: 15px; }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-2px); }
        .btn-ghost { background: transparent; color: var(--text-dim); border: 1px solid #334155; }
        
        .modal { position: fixed; inset: 0; background: rgba(2, 6, 23, 0.95); display: flex; justify-content: center; align-items: center; z-index: 1000; padding: 20px; }
        .modal-content { background: var(--card-bg); padding: 35px; border-radius: 32px; width: 100%; max-width: 450px; text-align: center; border: 1px solid var(--primary); }
        .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 25px 0; }
        .res-box { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 15px; }
        .res-val { font-size: 24px; font-weight: 800; color: var(--primary); }
        .res-val.fail { color: var(--secondary); }

        .hidden { display: none !important; }
        .std-input { width: 100%; padding: 12px; background: var(--input-bg); border: 1px solid #334155; border-radius: 10px; color: white; margin-bottom: 15px; box-sizing: border-box; }
        
        #leaderboard-list { margin-top: 20px; background: rgba(0,0,0,0.2); border-radius: 15px; max-height: 250px; overflow-y: auto; }
        .rank-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .rank-avatar { width: 30px; height: 30px; border-radius: 5px; object-fit: cover; background: #000; }
    </style>
</head>
<body>

    <div class="container">
        <div id="auth-ui" class="card">
            <h2>⌨️ LOGIN</h2>
            <input type="text" id="login-user" class="std-input" placeholder="ชื่อผู้ใช้ / Username">
            <input type="password" id="login-pass" class="std-input" placeholder="รหัสผ่าน">
            <div style="display: flex; gap: 10px;">
                <button class="btn-ghost" style="flex: 1;" onclick="handleAuth('up')">สมัครใหม่</button>
                <button class="btn-primary" style="flex: 2; margin-top:0;" onclick="handleAuth('in')">เข้าสู่ระบบ</button>
            </div>
        </div>

        <div id="game-ui" class="card hidden">
            <div class="profile-bar">
                <div style="display: flex; align-items: center; gap: 12px;">
                    <img id="display-avatar" class="user-avatar" src="">
                    <div>
                        <div id="display-name" style="font-weight: 800;">Loading...</div>
                        <div style="font-size: 11px; color: var(--primary);">TYPING MASTER</div>
                    </div>
                </div>
                <div style="display: flex; gap: 8px;">
                    <button class="btn-ghost" onclick="toggleModal('profile-modal', true)">⚙️</button>
                    <button class="btn-ghost" onclick="auth.signOut()">🚪</button>
                </div>
            </div>

            <div style="display: flex; justify-content: space-around; margin-bottom: 10px;">
                <div style="text-align:center"><small>เวลาที่เหลือ</small><div id="timer" style="font-size: 24px; color:var(--secondary)">60s</div></div>
                <div style="text-align:center"><small>พิมพ์ถูก (WPM)</small><div id="wpm-live" style="font-size: 24px; color:var(--primary)">0</div></div>
            </div>

            <div class="word-display-container">
                <div id="word-list-wrapper">
                    <div style="width:100%; text-align:center; color:var(--text-dim); margin-top:15px; font-size: 20px;">
                        กดปุ่มด้านล่างเพื่อเริ่มการแข่ง
                    </div>
                </div>
            </div>
            <input type="text" id="typing-input" placeholder="พร้อมแล้วกด START!" disabled autocomplete="off">
            <button id="start-btn" class="btn-primary" onclick="startGame()">START RACE</button>

            <div style="margin-top: 25px;">
                <h4 style="font-size: 12px; color: var(--text-dim);">🏆 LEADERBOARD (Top 100)</h4>
                <div id="leaderboard-list"></div>
            </div>
        </div>
    </div>

    <div id="result-modal" class="modal hidden">
        <div class="modal-content">
            <h2 style="color: var(--primary); margin:0;">FINISH! 🏁</h2>
            <div class="result-grid">
                <div class="res-box"><small>พิมพ์ถูกต้อง</small><div id="res-correct" class="res-val">0</div></div>
                <div class="res-box"><small>พิมพ์ผิด</small><div id="res-wrong" class="res-val fail">0</div></div>
                <div class="res-box"><small>คำทั้งหมด</small><div id="res-total" class="res-val" style="color:white">0</div></div>
                <div class="res-box"><small>ความแม่นยำ</small><div id="res-acc" class="res-val" style="color:#eab308">0%</div></div>
            </div>
            <button class="btn-primary" onclick="closeResult()">ลองอีกครั้ง</button>
        </div>
    </div>

    <div id="profile-modal" class="modal hidden">
        <div class="modal-content">
            <h3>ตั้งค่าโปรไฟล์</h3>
            <img id="preview-img" style="width:80px; height:80px; border-radius:50%; margin-bottom:15px; object-fit:cover; border:2px solid var(--primary);" src="">
            <input type="file" id="file-input" accept="image/*" class="std-input" onchange="previewFile()">
            <input type="text" id="edit-name" class="std-input" placeholder="ชื่อที่แสดง">
            <div style="display: flex; gap: 10px;">
                <button class="btn-ghost" style="flex:1" onclick="toggleModal('profile-modal', false)">ยกเลิก</button>
                <button class="btn-primary" style="flex:1; margin-top:0;" onclick="saveProfile()">บันทึก</button>
            </div>
        </div>
    </div>

    <script>
        // --- Firebase Config ---
        const firebaseConfig = {
            apiKey: "AIzaSyC4lXsegdu_1H9coMKQNiPWj3Bg2sPxT-0",
            authDomain: "thaityping-5b95f.firebaseapp.com",
            projectId: "thaityping-5b95f",
            storageBucket: "thaityping-5b95f.firebasestorage.app",
            messagingSenderId: "870492285903",
            appId: "1:870492285903:web:c85e1c878b6dc699f600ba"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.firestore();

        const wordsMaster = ["ท้องฟ้า", "กะเพรา", "เทคโนโลยี", "มุ่งมั่น", "พัฒนา", "สำเร็จ", "จินตนาการ", "สดใส", "ท้าทาย", "ความสุข", "เรียนรู้", "แรงบันดาลใจ", "สร้างสรรค์", "ซื่อสัตย์", "กตัญญู", "ความรัก", "อดทน", "ระเบียบ", "วินัย", "ยุติธรรม", "อิสระ", "เป้าหมาย", "เดินทาง", "ปลอดภัย", "ธรรมชาติ", "สิ่งแวดล้อม", "แข็งแรง", "แบ่งปัน", "เมตตา", "รวดเร็ว", "แม่นยำ", "อนาคต", "ปัจจุบัน", "ประวัติศาสตร์", "ภาษาไทย", "คีย์บอร์ด", "คอมพิวเตอร์", "โปรแกรมเมอร์", "นวัตกรรม", "อวกาศ", "จักรวาล", "มหัศจรรย์", "ท่องเที่ยว", "ประสบการณ์", "คุณภาพ", "มาตรฐาน", "ระบบ", "โอกาส", "บทเรียน", "พยายาม"];
        
        let timer, timeLeft, isPlaying = false;
        let correctWords = 0, wrongWords = 0, currentWordIndex = 0, gameWords = [];
        let userPhotoBase64 = "";

        function toggleModal(id, show) { document.getElementById(id).classList.toggle('hidden', !show); }

        function getRobotAvatar(uid) {
            return `https://api.dicebear.com/7.x/bottts/svg?seed=${uid}`;
        }

        function startGame() {
            if(isPlaying) return;
            isPlaying = true;
            timeLeft = 60; correctWords = 0; wrongWords = 0; currentWordIndex = 0;
            gameWords = Array.from({length: 200}, () => wordsMaster[Math.floor(Math.random() * wordsMaster.length)]);
            
            const wrapper = document.getElementById('word-list-wrapper');
            wrapper.style.transform = `translateY(0px)`;
            wrapper.innerHTML = gameWords.map((w, i) => `<span class="word" id="w-${i}">${w}</span>`).join('');
            
            document.getElementById('wpm-live').innerText = "0";
            document.getElementById('timer').innerText = "60s";
            document.getElementById('typing-input').disabled = false;
            document.getElementById('typing-input').value = '';
            document.getElementById('typing-input').focus();
            document.getElementById('start-btn').classList.add('hidden');
            
            timer = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft + "s";
                if(timeLeft <= 0) endGame();
            }, 1000);
            updateHighlight();
        }

        function updateHighlight() {
            const words = document.querySelectorAll('.word');
            words.forEach(el => el.classList.remove('active'));
            const cur = document.getElementById(`w-${currentWordIndex}`);
            if(cur) {
                cur.classList.add('active');
                if (cur.offsetTop > 40) {
                    document.getElementById('word-list-wrapper').style.transform = `translateY(-${cur.offsetTop - 5}px)`;
                }
            }
        }

        document.getElementById('typing-input').addEventListener('input', (e) => {
            if(e.target.value.endsWith(' ')) {
                const typed = e.target.value.trim();
                const target = gameWords[currentWordIndex];
                const el = document.getElementById(`w-${currentWordIndex}`);
                
                if(typed === target) { 
                    correctWords++; 
                    el.classList.add('correct'); 
                } else { 
                    wrongWords++;
                    el.classList.add('incorrect'); 
                }
                
                currentWordIndex++;
                document.getElementById('wpm-live').innerText = correctWords;
                e.target.value = '';
                updateHighlight();
            }
        });

        async function endGame() {
            clearInterval(timer);
            isPlaying = false;
            
            const total = correctWords + wrongWords;
            const acc = total > 0 ? Math.round((correctWords / total) * 100) : 0;
            
            document.getElementById('res-correct').innerText = correctWords;
            document.getElementById('res-wrong').innerText = wrongWords;
            document.getElementById('res-total').innerText = total;
            document.getElementById('res-acc').innerText = acc + "%";
            
            document.getElementById('word-list-wrapper').innerHTML = `<div style="width:100%; text-align:center; color:var(--text-dim); margin-top:15px; font-size: 20px;">สรุปผลการแข่ง...</div>`;
            
            document.getElementById('typing-input').disabled = true;
            document.getElementById('start-btn').classList.remove('hidden');
            document.getElementById('start-btn').innerText = "START AGAIN";

            toggleModal('result-modal', true);

            const user = auth.currentUser;
            if (user) {
                const userRef = db.collection("leaderboard").doc(user.uid);
                const doc = await userRef.get();
                if (!doc.exists || correctWords > (doc.data().wpm || 0)) {
                    await userRef.set({ 
                        wpm: correctWords, 
                        name: document.getElementById('display-name').innerText, 
                        photo: document.getElementById('display-avatar').src 
                    }, { merge: true });
                }
                loadRanking();
            }
        }

        function closeResult() {
            toggleModal('result-modal', false);
            document.getElementById('word-list-wrapper').innerHTML = `<div style="width:100%; text-align:center; color:var(--text-dim); margin-top:15px; font-size: 20px;">กดปุ่มด้านล่างเพื่อเริ่มการแข่ง</div>`;
        }

        function previewFile() {
            const file = document.getElementById('file-input').files[0];
            const reader = new FileReader();
            reader.onloadend = () => {
                document.getElementById('preview-img').src = reader.result;
                userPhotoBase64 = reader.result;
            }
            if (file) reader.readAsDataURL(file);
        }

        async function saveProfile() {
            const newName = document.getElementById('edit-name').value.trim();
            const user = auth.currentUser;
            if (!newName || !user) return alert("กรุณาใส่ชื่อ");
            
            await db.collection("leaderboard").doc(user.uid).set({
                name: newName, 
                photo: userPhotoBase64 || document.getElementById('display-avatar').src
            }, { merge: true });
            
            updateUIFromDB(user);
            toggleModal('profile-modal', false);
        }

        async function updateUIFromDB(user) {
            const doc = await db.collection("leaderboard").doc(user.uid).get();
            const data = doc.data() || {};
            
            let finalName = data.name;
            if(!finalName) {
                const rawName = user.email.split('@')[0];
                try {
                    finalName = decodeURIComponent(rawName);
                } catch(e) {
                    finalName = rawName;
                }
            }
            
            const finalPhoto = data.photo || getRobotAvatar(user.uid);
            
            document.getElementById('display-name').innerText = finalName;
            document.getElementById('display-avatar').src = finalPhoto;
            document.getElementById('preview-img').src = finalPhoto;
            document.getElementById('edit-name').value = finalName;
        }

        // --- แก้ไขจุดแสดงลำดับ และจำนวน Leaderboard เป็น 100 ---
        async function loadRanking() {
            const snap = await db.collection("leaderboard").orderBy("wpm", "desc").limit(100).get();
            let html = '';
            let index = 1;
            snap.forEach((doc) => {
                const d = doc.data();
                if(d.wpm === undefined || d.wpm === null) return;
                const img = d.photo || getRobotAvatar(doc.id);
                html += `<div class="rank-item">
                    <div style="display:flex; align-items:center; gap:10px">
                        <small>${index}</small>
                        <img src="${img}" class="rank-avatar">
                        <span>${d.name || 'Unknown'}</span>
                    </div>
                    <strong style="color:var(--primary)">${d.wpm} WPM</strong>
                </div>`;
                index++;
            });
            document.getElementById('leaderboard-list').innerHTML = html;
        }

        async function handleAuth(type) {
            const userInput = document.getElementById('login-user').value.trim();
            const pass = document.getElementById('login-pass').value;
            if(!userInput || pass.length < 6) return alert("กรุณากรอกข้อมูลให้ครบ (รหัส 6 ตัวขึ้นไป)");
            
            const email = encodeURIComponent(userInput) + "@typing.com";
            
            try {
                if(type === 'up') {
                    const res = await auth.createUserWithEmailAndPassword(email, pass);
                    await db.collection("leaderboard").doc(res.user.uid).set({
                        name: userInput,
                        wpm: 0,
                        photo: getRobotAvatar(res.user.uid)
                    }, { merge: true });
                } else {
                    await auth.signInWithEmailAndPassword(email, pass);
                }
            } catch(e) {
                alert(type === 'up' ? "มีชื่อผู้ใช้นี้แล้ว" : "ชื่อผู้ใช้หรือรหัสผ่านผิด");
            }
        }

        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('auth-ui').classList.add('hidden');
                document.getElementById('game-ui').classList.remove('hidden');
                updateUIFromDB(user);
                loadRanking();
            } else {
                document.getElementById('auth-ui').classList.remove('hidden');
                document.getElementById('game-ui').classList.add('hidden');
            }
        });
    </script>
</body>
</html>
