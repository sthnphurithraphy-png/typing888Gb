<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Language Typing Pro ⌨️🌍</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    
    <style>
        :root {
            --primary: #2dd4bf;
            --secondary: #fb7185;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f1f5f9;
            --text-dim: #64748b;
            --input-bg: #020617;
            --xp-color: #3b82f6;
            --accent: #a855f7;
            --border: rgba(255,255,255,0.1);
        }

        body.light-theme {
            --primary: #0d9488;
            --secondary: #e11d48;
            --bg: #f1f5f9;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-dim: #64748b;
            --input-bg: #f8fafc;
            --xp-color: #2563eb;
            --accent: #7c3aed;
            --border: rgba(0,0,0,0.1);
        }
        
        body { font-family: 'Inter', 'Kanit', sans-serif; background: var(--bg); color: var(--text-main); margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; transition: background 0.3s, color 0.3s; }
        .container { width: 100%; max-width: 750px; padding: 20px; }
        .card { background: var(--card-bg); border-radius: 28px; padding: 40px; border: 1px solid var(--border); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.2); position: relative; }

        .theme-toggle { position: absolute; top: 20px; right: 20px; cursor: pointer; font-size: 20px; background: var(--input-bg); border: 1px solid var(--border); padding: 8px; border-radius: 12px; }

        .mode-selector { display: flex; background: var(--input-bg); padding: 5px; border-radius: 16px; margin-bottom: 25px; border: 1px solid var(--border); }
        .mode-btn { flex: 1; padding: 10px; border-radius: 12px; cursor: pointer; text-align: center; font-weight: 700; transition: 0.3s; color: var(--text-dim); }
        .mode-btn.active { background: var(--primary); color: white; box-shadow: 0 4px 15px rgba(45, 212, 191, 0.3); }

        .profile-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: rgba(0,0,0,0.05); padding: 15px 25px; border-radius: 24px; border: 1px solid var(--border); }
        .avatar-container { position: relative; width: 60px; height: 60px; }
        .user-avatar { width: 100%; height: 100%; border-radius: 16px; object-fit: cover; border: 2px solid var(--primary); background: var(--input-bg); }
        .lvl-badge { position: absolute; bottom: -5px; right: -5px; background: var(--xp-color); color: white; font-size: 11px; font-weight: 900; padding: 2px 8px; border-radius: 8px; border: 2px solid var(--card-bg); }
        
        .xp-info { flex-grow: 1; margin: 0 20px; }
        .xp-bar-bg { width: 100%; height: 10px; background: var(--input-bg); border-radius: 10px; margin-top: 8px; overflow: hidden; border: 1px solid var(--border); }
        .xp-bar-fill { height: 100%; background: linear-gradient(90deg, var(--xp-color), var(--primary)); width: 0%; transition: width 0.6s ease; }

        .word-display-container { font-size: 30px; padding: 20px; background: var(--input-bg); border-radius: 22px; margin: 25px 0; height: 110px; overflow: hidden; border: 2px solid var(--border); position: relative; line-height: 1.6; user-select: none; }
        #word-list-wrapper { display: flex; flex-wrap: wrap; gap: 12px 24px; transition: transform 0.2s ease; align-content: flex-start; position: relative; padding-top: 5px; }
        
        .word { color: var(--text-dim); transition: 0.2s; white-space: nowrap; }
        .word.active { color: var(--text-main); background: rgba(255,255,255,0.1); border-radius: 8px; box-shadow: 0 4px 0 var(--primary); }
        .word.correct { color: var(--primary); }
        .word.incorrect { color: var(--secondary); text-decoration: underline; }
        
        #typing-input { width: 100%; padding: 22px; background: var(--input-bg); border: 2px solid var(--border); border-radius: 20px; font-size: 26px; color: var(--text-main); outline: none; text-align: center; box-sizing: border-box; transition: 0.3s; }
        #typing-input:focus { border-color: var(--primary); box-shadow: 0 0 20px rgba(45, 212, 191, 0.1); }

        button { border: none; padding: 15px 30px; border-radius: 15px; cursor: pointer; font-weight: 700; transition: 0.2s; font-family: 'Kanit'; }
        .btn-primary { background: var(--primary); color: white; width: 100%; margin-top: 20px; font-size: 18px; text-transform: uppercase; }
        .btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); }
        .btn-secondary { background: var(--secondary); color: white; width: 100%; margin-top: 10px; }
        .btn-ghost { background: var(--input-bg); color: var(--text-dim); border: 1px solid var(--border); }
        
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; justify-content: center; align-items: center; z-index: 1000; padding: 20px; backdrop-filter: blur(5px); }
        .modal-content { background: var(--card-bg); padding: 40px; border-radius: 35px; width: 100%; max-width: 480px; text-align: center; border: 1px solid var(--primary); color: var(--text-main); }
        
        .hidden { display: none !important; }
        .std-input { width: 100%; padding: 14px; background: var(--input-bg); border: 1px solid var(--border); border-radius: 12px; color: var(--text-main); margin-bottom: 15px; box-sizing: border-box; }
        
        #leaderboard-list { margin-top: 15px; background: rgba(0,0,0,0.05); border-radius: 20px; max-height: 300px; overflow-y: auto; padding: 10px; border: 1px solid var(--border); }
        .rank-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 18px; border-bottom: 1px solid var(--border); }
        .rank-avatar-box { position: relative; width: 42px; height: 42px; }
        .rank-avatar { width: 100%; height: 100%; border-radius: 10px; object-fit: cover; background: #ccc; }
        .rank-lvl { position: absolute; top: -5px; left: -5px; background: var(--xp-color); color: white; font-size: 9px; padding: 2px 4px; border-radius: 4px; border: 1px solid var(--card-bg); }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        .stat-box { background: rgba(0,0,0,0.05); padding: 15px; border-radius: 18px; text-align: left; border: 1px solid var(--border); }

        .toggle-eye { cursor: pointer; font-size: 14px; opacity: 0.5; transition: 0.3s; vertical-align: middle; margin-left: 5px; }
        .toggle-eye:hover { opacity: 1; }
        .hidden-value { color: transparent !important; text-shadow: 0 0 8px var(--primary); user-select: none; }
        .hidden-value-red { color: transparent !important; text-shadow: 0 0 8px var(--secondary); user-select: none; }
    </style>
</head>
<body>

    <div class="container">
        <div id="auth-ui" class="card">
            <div class="theme-toggle" onclick="toggleTheme()">🌓</div>
            <h2 style="text-align: center; margin-bottom: 30px;">🌍 TYPING WORLD RACE</h2>
            <input type="text" id="login-user" class="std-input" placeholder="ชื่อผู้ใช้">
            <input type="password" id="login-pass" class="std-input" placeholder="รหัสผ่าน">
            <div style="display: flex; gap: 15px;">
                <button class="btn-ghost" style="flex: 1;" onclick="handleAuth('up')">สมัครใหม่</button>
                <button class="btn-primary" style="flex: 2; margin-top:0;" onclick="handleAuth('in')">เข้าสู่ระบบ</button>
            </div>
        </div>

        <div id="game-ui" class="card hidden">
            <div class="theme-toggle" onclick="toggleTheme()">🌓</div>
            <div class="profile-bar">
                <div class="avatar-container">
                    <img id="display-avatar" class="user-avatar" src="">
                    <div id="display-lvl-badge" class="lvl-badge">LV.1</div>
                </div>
                <div class="xp-info">
                    <div id="display-name" style="font-weight: 800; font-size: 16px; color: var(--primary);">Loading...</div>
                    <div class="xp-bar-bg"><div id="xp-fill" class="xp-bar-fill"></div></div>
                    <div style="font-size: 10px; margin-top: 5px; color: var(--text-dim); display: flex; justify-content: space-between;">
                        <span id="xp-text">EXP: 0 / 100</span>
                        <span id="lvl-percent">0%</span>
                    </div>
                </div>
                <div style="display: flex; gap: 8px;">
                    <button class="btn-ghost" style="padding: 10px 15px;" onclick="toggleModal('profile-modal', true)">⚙️</button>
                    <button class="btn-ghost" style="padding: 10px 15px;" onclick="auth.signOut()">🚪</button>
                </div>
            </div>

            <div class="mode-selector">
                <div class="mode-btn active" id="mode-th" onclick="switchMode('th')">🇹🇭 THAI</div>
                <div class="mode-btn" id="mode-en" onclick="switchMode('en')">🇺🇸 ENGLISH</div>
            </div>

            <div style="display: flex; justify-content: space-between; margin: 15px 0; background: rgba(0,0,0,0.05); padding: 15px; border-radius: 20px; border: 1px solid var(--border);">
                <div style="text-align:center; flex:1">
                    <small style="color:var(--text-dim)">TIME <span class="toggle-eye" onclick="toggleVisibility('timer', 'hidden-value-red')">👁️</span></small>
                    <div id="timer" style="font-size: 28px; font-weight: 800; color:var(--secondary)">60s</div>
                </div>
                <div style="text-align:center; flex:1">
                    <small style="color:var(--text-dim)">CORRECT <span class="toggle-eye" onclick="toggleVisibility('wpm-live', 'hidden-value')">👁️</span></small>
                    <div id="wpm-live" style="font-size: 28px; font-weight: 800; color:var(--primary)">0</div>
                </div>
                <div style="text-align:center; flex:1">
                    <small style="color:var(--text-dim)">WRONG <span class="toggle-eye" onclick="toggleVisibility('wrong-live', 'hidden-value-red')">👁️</span></small>
                    <div id="wrong-live" style="font-size: 28px; font-weight: 800; color:var(--secondary)">0</div>
                </div>
            </div>

            <div class="word-display-container" id="display-box">
                <div id="word-list-wrapper"></div>
            </div>
            
            <input type="text" id="typing-input" placeholder="เลือกภาษาแล้วกด START..." disabled autocomplete="off">
            <div id="control-btns">
                <button id="start-btn" class="btn-primary" onclick="startGame()">START RACE ⚡</button>
                <button id="stop-btn" class="btn-secondary hidden" onclick="resetGameManually()">STOP / CANCEL 🛑</button>
            </div>

            <div style="margin-top: 30px;">
                <h4 id="leaderboard-title" style="font-size: 11px; color: var(--primary); margin-bottom: 10px; text-align: center; letter-spacing: 2px;">🏆 TOP 100 RACERS</h4>
                <div id="leaderboard-list"></div>
            </div>
        </div>
    </div>

    <div id="result-modal" class="modal hidden">
        <div class="modal-content">
            <h2 style="color: var(--primary); font-size: 32px; margin-bottom: 5px;">FINISHED! 🏁</h2>
            <div class="stats-grid">
                <div class="stat-box">
                    <small>ถูกต้อง</small>
                    <div id="res-correct" style="font-size: 24px; font-weight: 800; color: var(--primary);">0</div>
                </div>
                <div class="stat-box">
                    <small>แม่นยำ</small>
                    <div id="res-acc" style="font-size: 24px; font-weight: 800; color: #eab308;">0%</div>
                </div>
            </div>
            <div id="xp-gain-text" style="font-size: 28px; font-weight: 900; color: var(--xp-color); margin-bottom: 20px;">+0 EXP</div>
            <button class="btn-primary" onclick="closeResult()">CONTINUE</button>
        </div>
    </div>

    <div id="profile-modal" class="modal hidden">
        <div class="modal-content">
            <h3>Edit Profile</h3>
            <input type="file" id="file-input" accept="image/*" class="std-input" onchange="previewFile()">
            <input type="text" id="edit-name" class="std-input" placeholder="ชื่อใหม่ของคุณ">
            <button class="btn-primary" onclick="saveProfile()">SAVE</button>
            <button class="btn-ghost" style="width:100%; margin-top:10px;" onclick="toggleModal('profile-modal', false)">CANCEL</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC4lXsegdu_1H9coMKQNiPWj3Bg2sPxT-0",
            authDomain: "thaityping-5b95f.firebaseapp.com",
            projectId: "thaityping-5b95f",
            storageBucket: "thaityping-5b95f.firebasestorage.app",
            messagingSenderId: "870492285903",
            appId: "1:870492285903:web:c85e1c878b6dc699f600ba"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.firestore();

        const dict_1_syl = {
            th: ["กิน", "นอน", "เดิน", "วิ่ง", "ดู", "มา", "ไป", "ดี", "ใจ", "มือ", "ตา", "หู", "น้ำ", "ไฟ", "รัก", "บ้าน", "รถ", "คน", "มด", "นก", "บน", "ล่าง", "ซ้าย", "ขวา", "เรียน", "เล่น", "ทำ", "สวย", "รวย", "จน", "ค่ะ", "ครับ", "เรา", "เธอ", "เขา", "ใน", "นอก", "ปัด", "เป่า", "แปรง", "เขียน", "อ่าน", "ฟัง", "ชาม", "แก้ว", "จาน", "ดิน", "ลม", "ฝน", "ฟ้า", "ขาว", "ดำ", "แดง", "เขียว", "ทอง", "เงิน", "งาน", "พัก", "ผ่อน", "ยิ้ม", "ขำ", "หมู", "หมา", "แมว", "ม้า", "ปลา", "ปู", "งู", "ไม้", "ไก่", "ไข่", "น้า", "อา", "ป้า", "ลุง", "แม่", "พ่อ", "พี่", "น้อง", "คุณ", "ท่าน", "เนย", "นม", "กาง", "แขน", "ขา", "เอว", "ท้อง", "ฟัน", "ปาก", "จมูก", "แก้ม", "คิ้ว", "ผม", "ขน", "เล็บ", "นิ้ว", "ตัว"],
            en: ["the", "quick", "brown", "fox", "jumps", "over", "lazy", "dog", "work", "play", "love", "game", "fire", "water", "earth", "wind", "blue", "red", "green", "bird", "fish", "small", "large", "ready", "start", "code", "best", "cool", "now", "here", "there", "some", "more", "last", "next", "page", "text", "font", "size", "dark", "light", "home", "back", "show", "hide", "save", "edit", "user", "name", "pass", "file", "web", "app", "site", "link", "bold", "time", "date", "year", "day", "way", "car", "bus", "ship", "road", "sky", "moon", "star", "sun", "tree", "leaf", "root", "seed", "wall", "door", "room", "key", "box", "bag", "cup", "pen", "book", "boy", "girl", "man", "kid", "son", "old", "new", "low", "high"]
        };

        const dict_2_syl = {
            th: ["กระท่อม", "บริษัท", "ทำงาน", "ขยัน", "ร่าเริง", "สดใส", "ต้นไม้", "ภูเขา", "ทะเล", "อาหาร", "ขนม", "สะอาด", "ท้องฟ้า", "กะเพรา", "มะม่วง", "ปากกา", "สมุด", "ดินสอ", "เก้าอี้", "โต๊ะเรียน", "รองเท้า", "ถุงเท้า", "เสื้อผ้า", "นาฬิกา", "มือถือ", "คอมพิวเตอร์", "น้ำหวาน", "กาแฟ", "ส้มตำ", "โรงเรียน", "ตลาด", "ร่มเงา", "ความสุข", "จริงใจ", "อดทน", "ใจดี", "ก้าวหน้า", "ชีวิต", "มุ่งมั่น", "มั่งคั่ง"],
            en: ["apple", "orange", "coding", "active", "bright", "forest", "mountain", "ocean", "happy", "dinner", "morning", "evening", "flower", "winter", "summer", "weather", "stable", "school", "office", "laptop", "mobile", "coffee", "sugar", "market", "leader", "member", "people", "future", "system", "window", "player", "music", "button", "screen", "header", "footer", "content", "border", "shadow", "layout"]
        };

        let currentMode = 'th', timer = null, timeLeft, isPlaying = false;
        let correctWords = 0, wrongWords = 0, currentWordIndex = 0, gameWords = [], userXP = 0;

        function toggleVisibility(id, className) {
            document.getElementById(id).classList.toggle(className);
        }

        function toggleTheme() {
            document.body.classList.toggle('light-theme');
            localStorage.setItem('theme', document.body.classList.contains('light-theme') ? 'light' : 'dark');
        }

        if (localStorage.getItem('theme') === 'light') document.body.classList.add('light-theme');

        function generateMixedWords(mode) {
            let words = [];
            const oneSyl = dict_1_syl[mode];
            const twoSyl = dict_2_syl[mode];
            for(let i=0; i<1000; i++) {
                if(Math.random() > 0.2) {
                    words.push(oneSyl[Math.floor(Math.random() * oneSyl.length)]);
                } else {
                    words.push(twoSyl[Math.floor(Math.random() * twoSyl.length)]);
                }
            }
            return words;
        }

        function getRobotAvatar(uid) { return `https://api.dicebear.com/7.x/bottts/svg?seed=${uid}`; }
        function toggleModal(id, show) { document.getElementById(id).classList.toggle('hidden', !show); }

        function calculateLevel(xp) {
            let lvl = 1, xpReq = 100, rem = xp;
            while (rem >= xpReq) { rem -= xpReq; lvl++; xpReq = Math.floor(100 * Math.pow(1.2, lvl - 1) + (lvl * 50)); }
            return { lvl, currentXP: Math.floor(rem), nextXP: Math.floor(xpReq) };
        }

        async function updateUIFromDB(user) {
            const doc = await db.collection("users").doc(user.uid).get();
            const data = doc.data() || { xp: 0, name: "User" };
            userXP = data.xp || 0;
            const lvData = calculateLevel(userXP);
            document.getElementById('display-name').innerText = data.name;
            document.getElementById('display-avatar').src = data.photo || getRobotAvatar(user.uid);
            document.getElementById('display-lvl-badge').innerText = `LV.${lvData.lvl}`;
            const pct = Math.floor((lvData.currentXP / lvData.nextXP) * 100);
            document.getElementById('xp-fill').style.width = `${pct}%`;
            document.getElementById('xp-text').innerText = `EXP: ${lvData.currentXP} / ${lvData.nextXP}`;
            document.getElementById('lvl-percent').innerText = `${pct}%`;
        }

        function switchMode(mode) {
            if(isPlaying) return;
            currentMode = mode;
            document.getElementById('mode-th').classList.toggle('active', mode === 'th');
            document.getElementById('mode-en').classList.toggle('active', mode === 'en');
            loadRanking();
        }

        function startGame() {
            if(isPlaying) return;
            isPlaying = true;
            timeLeft = 60; correctWords = 0; wrongWords = 0; currentWordIndex = 0;
            gameWords = generateMixedWords(currentMode);
            
            const wrapper = document.getElementById('word-list-wrapper');
            wrapper.style.transform = `translateY(0px)`;
            wrapper.innerHTML = gameWords.slice(0, 200).map((w, i) => `<span class="word" id="w-${i}">${w}</span>`).join('');
            
            document.getElementById('wpm-live').innerText = "0";
            document.getElementById('wrong-live').innerText = "0";
            document.getElementById('timer').innerText = "60s";
            document.getElementById('typing-input').disabled = false;
            document.getElementById('typing-input').value = '';
            document.getElementById('typing-input').focus();
            
            document.getElementById('start-btn').classList.add('hidden');
            document.getElementById('stop-btn').classList.remove('hidden');
            
            if(timer) clearInterval(timer);
            timer = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft + "s";
                if(timeLeft <= 0) endGame();
            }, 1000);
            updateHighlight();
        }

        function resetGameState() {
            clearInterval(timer);
            timer = null;
            isPlaying = false;
            document.getElementById('timer').innerText = "60s";
            document.getElementById('typing-input').value = '';
            document.getElementById('typing-input').disabled = true;
            document.getElementById('start-btn').classList.remove('hidden');
            document.getElementById('stop-btn').classList.add('hidden');
            document.getElementById('word-list-wrapper').innerHTML = '';
        }

        function resetGameManually() {
            if(confirm("ต้องการยกเลิกเกมนี้ใช่ไหม?")) resetGameState();
        }

        function updateHighlight() {
            const wrapper = document.getElementById('word-list-wrapper');
            document.querySelectorAll('.word').forEach(el => el.classList.remove('active'));
            const cur = document.getElementById(`w-${currentWordIndex}`);
            if(cur) {
                cur.classList.add('active');
                if (cur.offsetTop > 45) {
                    wrapper.style.transform = `translateY(-${cur.offsetTop - 10}px)`;
                }
            }
        }

        document.getElementById('typing-input').addEventListener('input', (e) => {
            if(e.target.value.endsWith(' ')) {
                const typed = e.target.value.trim();
                if(typed === "") { e.target.value = ''; return; }
                const el = document.getElementById(`w-${currentWordIndex}`);
                if(el) {
                    if(typed === gameWords[currentWordIndex]) { 
                        correctWords++; 
                        el.classList.add('correct'); 
                    } else { 
                        wrongWords++; 
                        el.classList.add('incorrect'); 
                    }
                    currentWordIndex++;
                    document.getElementById('wpm-live').innerText = correctWords;
                    document.getElementById('wrong-live').innerText = wrongWords;
                    e.target.value = '';
                    
                    if(currentWordIndex % 150 === 0) {
                        const nextBatch = gameWords.slice(currentWordIndex + 50, currentWordIndex + 250);
                        nextBatch.forEach((w, idx) => {
                            const span = document.createElement('span');
                            span.className = 'word';
                            span.id = `w-${currentWordIndex + 50 + idx}`;
                            span.innerText = w;
                            document.getElementById('word-list-wrapper').appendChild(span);
                        });
                    }
                    updateHighlight();
                }
            }
        });

        async function endGame() {
            const finalCorrect = correctWords;
            const finalWrong = wrongWords;
            resetGameState();

            const total = finalCorrect + finalWrong;
            const accuracy = total > 0 ? Math.round((finalCorrect / total) * 100) : 0;
            let finalXP = Math.max(5, Math.round((finalCorrect * 10) * (accuracy / 100)));

            document.getElementById('res-correct').innerText = finalCorrect;
            document.getElementById('res-acc').innerText = accuracy + "%";
            document.getElementById('xp-gain-text').innerText = `+${finalXP} EXP`;
            toggleModal('result-modal', true);

            const user = auth.currentUser;
            if (user) {
                const newXP = userXP + finalXP;
                await db.collection("users").doc(user.uid).set({ xp: newXP }, { merge: true });
                const lbRef = db.collection(`leaderboard_${currentMode}`).doc(user.uid);
                const currentLB = await lbRef.get();
                const bestWPM = Math.max((currentLB.data()?.wpm || 0), finalCorrect);
                await lbRef.set({ 
                    name: document.getElementById('display-name').innerText, 
                    wpm: bestWPM, 
                    photo: document.getElementById('display-avatar').src, 
                    xp: newXP 
                }, { merge: true });
                updateUIFromDB(user); 
                loadRanking();
            }
        }

        async function loadRanking() {
            const snap = await db.collection(`leaderboard_${currentMode}`).orderBy("wpm", "desc").limit(100).get();
            let html = '';
            let idx = 1;
            snap.forEach(doc => {
                const d = doc.data();
                const lv = calculateLevel(d.xp || 0).lvl;
                html += `
                <div class="rank-item">
                    <div style="display:flex; align-items:center; gap:10px">
                        <small style="color:var(--text-dim); width:20px">${idx++}</small>
                        <div class="rank-avatar-box">
                            <img src="${d.photo || getRobotAvatar(doc.id)}" class="rank-avatar">
                            <span class="rank-lvl">${lv}</span>
                        </div>
                        <span style="font-weight:600; font-size:14px">${d.name}</span>
                    </div>
                    <strong style="color:var(--primary)">${d.wpm} <small style="font-size:9px">WPM</small></strong>
                </div>`;
            });
            document.getElementById('leaderboard-list').innerHTML = html || '<div style="text-align:center; padding:20px; color:var(--text-dim)">No data</div>';
        }

        async function handleAuth(type) {
            const u = document.getElementById('login-user').value.trim();
            const p = document.getElementById('login-pass').value;
            if(!u || p.length < 6) return alert("ชื่อและรหัสผ่าน 6 ตัวขึ้นไป");
            const safeEmail = btoa(u).substring(0,15) + "@typing.com";
            try {
                if(type === 'up') {
                    const res = await auth.createUserWithEmailAndPassword(safeEmail, p);
                    await db.collection("users").doc(res.user.uid).set({ name: u, xp: 0 });
                } else { await auth.signInWithEmailAndPassword(safeEmail, p); }
            } catch(e) { alert("เกิดข้อผิดพลาดในการเข้าสู่ระบบ"); }
        }

        let base64Avatar = "";
        function previewFile() {
            const file = document.getElementById('file-input').files[0];
            const reader = new FileReader();
            reader.onloadend = () => { base64Avatar = reader.result; };
            if (file) reader.readAsDataURL(file);
        }

        async function saveProfile() {
            const newName = document.getElementById('edit-name').value.trim();
            const user = auth.currentUser;
            if(!user) return;
            
            let updateData = {};
            if(newName) updateData.name = newName;
            if(base64Avatar) updateData.photo = base64Avatar;
            
            if(Object.keys(updateData).length === 0) return;

            // 1. Update main user document
            await db.collection("users").doc(user.uid).set(updateData, { merge: true });
            
            // 2. Update all leaderboards where this user exists
            const modes = ['th', 'en'];
            for(const m of modes) {
                const lbRef = db.collection(`leaderboard_${m}`).doc(user.uid);
                const lbDoc = await lbRef.get();
                if(lbDoc.exists) {
                    await lbRef.set(updateData, { merge: true });
                }
            }

            base64Avatar = ""; // Reset temporary storage
            updateUIFromDB(user); 
            loadRanking();
            toggleModal('profile-modal', false);
            alert("บันทึกข้อมูลเรียบร้อยแล้ว");
        }

        auth.onAuthStateChanged(user => {
            if(user) {
                toggleModal('auth-ui', false); 
                document.getElementById('game-ui').classList.remove('hidden');
                updateUIFromDB(user); loadRanking();
            } else {
                toggleModal('auth-ui', true); 
                document.getElementById('game-ui').classList.add('hidden');
            }
        });

        function closeResult() { toggleModal('result-modal', false); }
    </script>
</body>
</html>
