<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Language Typing Pro ⌨️🌍</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/3242/3242202.png">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-storage-compat.js"></script>
    
    <style>
        :root {
            --primary: #2dd4bf;
            --secondary: #fb7185;
            --bg-gradient: linear-gradient(-45deg, #0f172a, #1e1b4b, #2d1b4d, #020617);
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --input-bg: rgba(2, 6, 23, 0.6);
            --xp-color: #3b82f6;
            --accent: #a855f7;
            --border: rgba(255,255,255,0.1);
            --error-bg: rgba(251, 113, 133, 0.15);
        }

        body.light-theme {
            --primary: #0d9488;
            --secondary: #e11d48;
            --bg-gradient: linear-gradient(-45deg, #f1f5f9, #e2e8f0, #dee2e6, #f8fafc);
            --card-bg: rgba(255, 255, 255, 0.8);
            --text-main: #1e293b;
            --text-dim: #64748b;
            --input-bg: rgba(248, 250, 252, 0.8);
            --xp-color: #2563eb;
            --accent: #7c3aed;
            --border: rgba(0,0,0,0.05);
            --error-bg: rgba(225, 29, 72, 0.1);
        }
        
        body { 
            font-family: 'Inter', 'Kanit', sans-serif; 
            background: var(--bg-gradient);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-main); 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            transition: background 0.3s, color 0.3s; 
            overflow-x: hidden; 
        }

        /* อนิเมชั่นพื้นหลังขยับเบาๆ */
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container { width: 100%; max-width: 850px; padding: 20px; z-index: 1; }
        
        .card { 
            background: var(--card-bg); 
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 32px; 
            padding: 40px; 
            border: 1px solid var(--border); 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.4); 
            position: relative; 
        }

        .top-controls { position: absolute; top: 20px; right: 20px; display: flex; gap: 10px; z-index: 10; }
        .icon-btn { cursor: pointer; font-size: 18px; background: var(--input-bg); border: 1px solid var(--border); padding: 8px; border-radius: 12px; transition: 0.2s; user-select: none; }
        .icon-btn:hover { border-color: var(--primary); background: var(--card-bg); }

        .mode-selector { display: flex; background: var(--input-bg); padding: 5px; border-radius: 16px; margin-bottom: 15px; border: 1px solid var(--border); gap: 5px; }
        .mode-btn { flex: 1; padding: 10px; border-radius: 12px; cursor: pointer; text-align: center; font-weight: 700; transition: 0.3s; color: var(--text-dim); font-size: 14px; }
        .mode-btn.active { background: var(--primary); color: white; box-shadow: 0 4px 15px rgba(45, 212, 191, 0.3); }

        .profile-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: rgba(0,0,0,0.15); padding: 12px 20px; border-radius: 24px; border: 1px solid var(--border); }
        .avatar-container { position: relative; width: 50px; height: 50px; }
        .user-avatar { width: 100%; height: 100%; border-radius: 14px; object-fit: cover; border: 2px solid var(--primary); background: var(--input-bg); }
        .lvl-badge { position: absolute; bottom: -5px; right: -5px; background: var(--xp-color); color: white; font-size: 10px; font-weight: 900; padding: 1px 6px; border-radius: 6px; border: 2px solid var(--card-bg); }
        
        .xp-info { flex-grow: 1; margin: 0 15px; }
        .xp-bar-bg { width: 100%; height: 8px; background: var(--input-bg); border-radius: 10px; margin-top: 5px; overflow: hidden; border: 1px solid var(--border); }
        .xp-bar-fill { height: 100%; background: linear-gradient(90deg, var(--xp-color), var(--primary)); width: 0%; transition: width 0.6s ease; }

        .stats-panel { position: relative; display: flex; justify-content: space-around; margin-bottom: 15px; background: rgba(0,0,0,0.1); padding: 12px; border-radius: 20px; border: 1px solid var(--border); transition: 0.3s; }
        .stats-panel.hidden-stats { opacity: 0; height: 0; margin-bottom: 0; padding: 0; transform: translateY(-10px); pointer-events: none; }

        .word-display-container { font-size: 28px; padding: 25px; background: var(--input-bg); border-radius: 22px; margin-bottom: 20px; height: 100px; overflow: hidden; border: 2px solid var(--border); position: relative; line-height: 1.5; user-select: none; }
        #word-list-wrapper { display: flex; flex-wrap: wrap; gap: 10px 20px; transition: transform 0.2s ease; align-content: flex-start; position: relative; }
        
        .word { color: var(--text-dim); transition: 0.1s; white-space: nowrap; border-radius: 4px; padding: 0 4px; border-bottom: 2px solid transparent; }
        .word.active { color: var(--text-main); background: rgba(255,255,255,0.1); border-bottom-color: var(--primary); }
        .word.correct { color: var(--primary) !important; }
        .word.incorrect { color: var(--secondary) !important; text-decoration: underline; }
        .word.typing-error { color: var(--secondary) !important; background: var(--error-bg); }
        
        .input-area { position: relative; display: flex; gap: 10px; }
        #typing-input { flex: 1; padding: 18px; background: var(--input-bg); border: 2px solid var(--border); border-radius: 18px; font-size: 22px; color: var(--text-main); outline: none; transition: 0.2s; font-family: 'Kanit'; }
        #typing-input:focus { border-color: var(--primary); background: rgba(0,0,0,0.3); }
        
        .reset-btn { width: 60px; background: var(--input-bg); border: 2px solid var(--border); border-radius: 18px; color: var(--text-dim); font-size: 24px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; }
        .reset-btn:hover { border-color: var(--primary); color: var(--primary); transform: rotate(15deg); }

        .stats-nav { display: flex; gap: 10px; margin-top: 20px; }
        .stats-btn { flex: 1; padding: 12px; border-radius: 14px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--text-main); cursor: pointer; font-weight: 600; font-size: 13px; transition: 0.2s; }
        .stats-btn:hover { background: var(--primary); color: white; border-color: var(--primary); }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 1000; padding: 20px; backdrop-filter: blur(12px); }
        .modal-content { background: #1e293b; padding: 35px; border-radius: 30px; width: 100%; max-width: 500px; text-align: center; border: 1px solid var(--primary); color: #f1f5f9; box-shadow: 0 0 30px rgba(45, 212, 191, 0.2); }
        
        .hidden { display: none !important; }

        .std-input { width: 100%; padding: 14px; background: var(--input-bg); border: 1px solid var(--border); border-radius: 12px; color: var(--text-main); margin-bottom: 15px; box-sizing: border-box; }
        
        #leaderboard-list { margin-top: 15px; background: rgba(0,0,0,0.2); border-radius: 20px; max-height: 350px; overflow-y: auto; border: 1px solid var(--border); }
        .rank-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; border-bottom: 1px solid var(--border); }
        .rank-info { display: flex; align-items: center; gap: 12px; }
        .rank-avatar { width: 35px; height: 35px; border-radius: 8px; border: 1px solid var(--primary); object-fit: cover; }
        .rank-lvl { font-size: 10px; background: var(--xp-color); color: white; padding: 2px 5px; border-radius: 4px; font-weight: 800; margin-left: 5px; }

        .best-record-card { background: linear-gradient(135deg, rgba(30, 41, 59, 0.8), #1e1b4b); border: 1px solid var(--primary); border-radius: 20px; padding: 20px; margin-bottom: 15px; }
        .best-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .best-box { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 12px; }

        button { border: none; padding: 12px 20px; border-radius: 12px; cursor: pointer; font-weight: 700; transition: 0.2s; font-family: 'Kanit'; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-primary { background: var(--primary); color: white; width: 100%; }
        .btn-ghost { background: rgba(255,255,255,0.05); color: var(--text-dim); border: 1px solid var(--border); }

        .settings-avatar-edit { position: relative; width: 100px; height: 100px; margin: 0 auto 20px; cursor: pointer; }
        .avatar-preview { width: 100px; height: 100px; border-radius: 20px; border: 3px solid var(--primary); object-fit: cover; }
        .upload-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.4); border-radius: 20px; display: flex; align-items: center; justify-content: center; opacity: 0; transition: 0.2s; color: white; font-size: 20px; }
        .settings-avatar-edit:hover .upload-overlay { opacity: 1; }
        .rand-avatar-btn { position: absolute; bottom: -5px; right: -5px; background: var(--primary); color: white; border-radius: 50%; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid #1e293b; z-index: 5; }
    </style>
</head>
<body>

    <div class="container">
        <div id="auth-ui" class="card">
            <h2 style="text-align: center; margin-bottom: 30px; letter-spacing: 2px;">🌍 TYPING WORLD RACE</h2>
            <input type="text" id="login-user" class="std-input" placeholder="ชื่อผู้ใช้">
            <input type="password" id="login-pass" class="std-input" placeholder="รหัสผ่าน (6 ตัวขึ้นไป)">
            <div style="display: flex; gap: 15px;">
                <button class="btn-ghost" style="flex: 1;" onclick="handleAuth('up')">สมัครใหม่</button>
                <button class="btn-primary" style="flex: 2;" onclick="handleAuth('in')">เข้าสู่ระบบ</button>
            </div>
        </div>

        <div id="game-ui" class="card hidden">
            <div class="top-controls">
                <div class="icon-btn" id="toggle-stats-btn" onclick="toggleStatsVisibility()" title="ซ่อน/แสดง สถิติ">👁️</div>
                <div class="icon-btn" onclick="openSettings()">⚙️</div>
                <div class="icon-btn" onclick="toggleTheme()">🌓</div>
            </div>
            
            <div class="profile-bar">
                <div class="avatar-container">
                    <img id="display-avatar" class="user-avatar" src="">
                    <div id="display-lvl-badge" class="lvl-badge">LV.1</div>
                </div>
                <div class="xp-info">
                    <div id="display-name" style="font-weight: 800; font-size: 15px; color: var(--primary); text-shadow: 0 0 10px rgba(45, 212, 191, 0.3);">Loading...</div>
                    <div class="xp-bar-bg"><div id="xp-fill" class="xp-bar-fill"></div></div>
                    <div style="font-size: 10px; color: var(--text-dim); margin-top: 2px;" id="xp-text">0 / 5000 XP</div>
                </div>
                <button class="btn-ghost" style="padding: 8px 12px;" onclick="auth.signOut()">🚪</button>
            </div>

            <div class="mode-selector">
                <div class="mode-btn active" id="mode-th" onclick="switchMode('th')">🇹🇭 THAI</div>
                <div class="mode-btn" id="mode-en" onclick="switchMode('en')">🇺🇸 ENGLISH</div>
            </div>

            <div id="main-stats-panel" class="stats-panel">
                <div class="stat-item" style="text-align:center"><small style="color:var(--text-dim)">TIME</small><div id="timer" style="font-size: 24px; font-weight: 800; color:var(--secondary)">60s</div></div>
                <div class="stat-item" style="text-align:center"><small style="color:var(--text-dim)">WPM</small><div id="wpm-live" style="font-size: 24px; font-weight: 800; color:var(--primary)">0</div></div>
                <div class="stat-item" style="text-align:center"><small style="color:var(--text-dim)">WRONG</small><div id="wrong-live" style="font-size: 24px; font-weight: 800; color:var(--secondary)">0</div></div>
            </div>

            <div class="word-display-container" id="display-box">
                <div id="word-list-wrapper"></div>
            </div>
            
            <div class="input-area">
                <input type="text" id="typing-input" placeholder="เริ่มพิมพ์เพื่อเริ่มเกม..." autocomplete="off">
                <button class="reset-btn" onclick="resetGame()">↻</button>
            </div>

            <div class="stats-nav">
                <button class="stats-btn" onclick="openBestModal()">📊 สถิติสูงสุดของฉัน</button>
                <button class="stats-btn" onclick="openLeaderboard()">🏆 อันดับโลกโหมดนี้</button>
            </div>
        </div>
    </div>

    <div id="settings-modal" class="modal hidden">
        <div class="modal-content">
            <h3>⚙️ ตั้งค่าโปรไฟล์</h3>
            <div class="settings-avatar-edit" onclick="document.getElementById('avatar-file').click()">
                <img id="settings-avatar-preview" class="avatar-preview" src="">
                <div class="upload-overlay">📷</div>
                <div class="rand-avatar-btn" onclick="event.stopPropagation(); randomizeAvatar()">🎲</div>
            </div>
            <input type="file" id="avatar-file" hidden accept="image/*" onchange="previewFile()">
            <input type="text" id="settings-name-input" class="std-input" placeholder="เปลี่ยนชื่อของคุณ">
            <div style="display: flex; gap: 10px;">
                <button class="btn-ghost" style="flex: 1;" onclick="toggleModal('settings-modal', false)">ยกเลิก</button>
                <button id="save-settings-btn" class="btn-primary" style="flex: 2;" onclick="handleSettingsSave()">บันทึก</button>
            </div>
        </div>
    </div>

    <div id="leaderboard-modal" class="modal hidden">
        <div class="modal-content">
            <h3>🏆 TOP 100</h3>
            <div id="leaderboard-list"></div>
            <button class="btn-primary" style="margin-top:20px" onclick="toggleModal('leaderboard-modal', false)">ปิดหน้าต่าง</button>
        </div>
    </div>

    <div id="best-modal" class="modal hidden">
        <div class="modal-content">
            <h3>📊 สถิติสูงสุดตลอดกาล</h3>
            <div class="best-record-card"><div style="color:var(--primary); font-weight: 800;">🇹🇭 ภาษาไทย</div><div class="best-grid"><div class="best-box"><small>WPM</small><div id="best-th-wpm">0</div></div><div class="best-box"><small>แม่นยำ</small><div id="best-th-acc">0%</div></div></div></div>
            <div class="best-record-card" style="border-color: var(--accent);"><div style="color:var(--accent); font-weight: 800;">🇺🇸 ภาษาอังกฤษ</div><div class="best-grid"><div class="best-box"><small>WPM</small><div id="best-en-wpm">0</div></div><div class="best-box"><small>แม่นยำ</small><div id="best-en-acc">0%</div></div></div></div>
            <button class="btn-primary" onclick="toggleModal('best-modal', false)">กลับไปฝึกซ้อม</button>
        </div>
    </div>

    <div id="result-modal" class="modal hidden">
        <div class="modal-content">
            <h2 style="color: var(--primary);">FINISHED! 🏁</h2>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0;">
                <div style="background: rgba(0,0,0,0.2); padding:15px; border-radius:15px;"><small>ความเร็ว</small><div id="res-wpm" style="font-size: 28px; font-weight: 800;">0</div>WPM</div>
                <div style="background: rgba(0,0,0,0.2); padding:15px; border-radius:15px;"><small>แม่นยำ</small><div id="res-acc" style="font-size: 28px; font-weight: 800;">0%</div></div>
            </div>
            <div id="xp-gain-text" style="font-size: 24px; font-weight: 900; color: var(--xp-color); margin-bottom: 20px;">+0 EXP</div>
            <button class="btn-primary" onclick="closeResult()">ฝึกใหม่อีกครั้ง</button>
        </div>
    </div>

        function updateHighlight() {
            document.querySelectorAll('.word').forEach(el => el.classList.remove('active'));
            const cur = document.getElementById(`w-${currentWordIndex}`);
            if(cur) {
                cur.classList.add('active');
                const wrapper = document.getElementById('word-list-wrapper');
                if (cur.offsetTop > 40) wrapper.style.transform = `translateY(-${cur.offsetTop - 10}px)`;
            }
        }

        async function endGame() {
            isPlaying = false; clearInterval(timer);
            const total = correctWords + wrongWords;
            const accuracy = total > 0 ? Math.round((correctWords / total) * 100) : 0;
            const xpGain = Math.max(1, Math.round((correctWords * (accuracy/100)) * 0.5));

            document.getElementById('res-wpm').innerText = correctWords;
            document.getElementById('res-acc').innerText = accuracy + "%";
            document.getElementById('xp-gain-text').innerText = `+${xpGain} EXP`;
            toggleModal('result-modal', true);

            const user = auth.currentUser;
            if(user) {
                const userDoc = await db.collection("users").doc(user.uid).get();
                const userData = userDoc.data();
                if(correctWords > (myBest[currentMode]?.wpm || 0)) {
                    myBest[currentMode] = { wpm: correctWords, acc: accuracy };
                    await db.collection("users").doc(user.uid).set({ best: myBest }, { merge: true });
                }
                const newXP = (userData.xp || 0) + xpGain;
                await db.collection("users").doc(user.uid).update({ xp: newXP });
                await db.collection(`leaderboard_${currentMode}`).doc(user.uid).set({
                    name: userData.name,
                    wpm: Math.max(correctWords, (await db.collection(`leaderboard_${currentMode}`).doc(user.uid).get()).data()?.wpm || 0),
                    xp: newXP, photo: userData.photo
                }, { merge: true });
                updateUIFromDB(user);
            }
        }

        async function updateUIFromDB(user) {
            const doc = await db.collection("users").doc(user.uid).get();
            const data = doc.data() || {};
            userXP = data.xp || 0;
            myBest = data.best || { th: { wpm: 0, acc: 0 }, en: { wpm: 0, acc: 0 } };
            document.getElementById('display-name').innerText = data.name || "User";
            document.getElementById('display-avatar').src = data.photo || `https://api.dicebear.com/7.x/bottts/svg?seed=${user.uid}`;
            
            const lv = getLevel(userXP);
            const nextXP = getXPForLevel(lv + 1);
            const currXP = getXPForLevel(lv);
            
            document.getElementById('display-lvl-badge').innerText = `LV.${lv}`;
            document.getElementById('xp-fill').style.width = `${((userXP - currXP) / (nextXP - currXP)) * 100}%`;
            document.getElementById('xp-text').innerText = `${Math.floor(userXP).toLocaleString()} / ${nextXP.toLocaleString()} XP`;
        }

        function openSettings() {
            const user = auth.currentUser;
            if(!user) return;
            db.collection("users").doc(user.uid).get().then(doc => {
                const data = doc.data();
                document.getElementById('settings-name-input').value = data.name || "";
                document.getElementById('settings-avatar-preview').src = data.photo || "";
                toggleModal('settings-modal', true);
            });
        }

        function randomizeAvatar() {
            const rand = Math.random().toString(36).substring(7);
            const newUrl = `https://api.dicebear.com/7.x/bottts/svg?seed=${rand}`;
            document.getElementById('settings-avatar-preview').src = newUrl;
        }

        function previewFile() {
            const file = document.getElementById('avatar-file').files[0];
            const reader = new FileReader();
            reader.onloadend = () => document.getElementById('settings-avatar-preview').src = reader.result;
            if (file) reader.readAsDataURL(file);
        }

        async function handleSettingsSave() {
            const btn = document.getElementById('save-settings-btn');
            const user = auth.currentUser;
            const newName = document.getElementById('settings-name-input').value.trim();
            const previewSrc = document.getElementById('settings-avatar-preview').src;
            const file = document.getElementById('avatar-file').files[0];

            if(!newName) return alert("กรุณาใส่ชื่อ");
            btn.disabled = true; btn.innerText = "กำลังบันทึก...";
            let finalPhotoUrl = previewSrc;

            if (file) {
                const ref = storage.ref(`avatars/${user.uid}`);
                await ref.put(file);
                finalPhotoUrl = await ref.getDownloadURL();
            }

            await db.collection("users").doc(user.uid).update({ name: newName, photo: finalPhotoUrl });
            await db.collection("leaderboard_th").doc(user.uid).set({ name: newName, photo: finalPhotoUrl }, {merge:true});
            await db.collection("leaderboard_en").doc(user.uid).set({ name: newName, photo: finalPhotoUrl }, {merge:true});

            updateUIFromDB(user);
            btn.disabled = false; btn.innerText = "บันทึก";
            toggleModal('settings-modal', false);
        }

        function closeResult() { toggleModal('result-modal', false); resetGame(); }
        function switchMode(mode) { if(isPlaying) return; currentMode = mode; document.getElementById('mode-th').classList.toggle('active', mode === 'th'); document.getElementById('mode-en').classList.toggle('active', mode === 'en'); resetGame(); }
        function openBestModal() { 
            document.getElementById('best-th-wpm').innerText = myBest.th.wpm; 
            document.getElementById('best-th-acc').innerText = myBest.th.acc + "%";
            document.getElementById('best-en-wpm').innerText = myBest.en.wpm;
            document.getElementById('best-en-acc').innerText = myBest.en.acc + "%";
            toggleModal('best-modal', true); 
        }

        async function openLeaderboard() {
            toggleModal('leaderboard-modal', true);
            document.getElementById('leaderboard-list').innerHTML = '<div style="padding:20px;">กำลังโหลด...</div>';
            const snap = await db.collection(`leaderboard_${currentMode}`).orderBy("wpm", "desc").limit(100).get();
            let html = ''; let i = 1;
            snap.forEach(doc => {
                const d = doc.data();
                html += `<div class="rank-item"><div class="rank-info"><b>${i++}.</b><img class="rank-avatar" src="${d.photo}"><div style="font-size:14px;">${d.name} <span class="rank-lvl">LV.${getLevel(d.xp)}</span></div></div><div style="color:var(--primary); font-weight:800;">${d.wpm} WPM</div></div>`;
            });
            document.getElementById('leaderboard-list').innerHTML = html || '<div style="padding:20px;">ไม่มีข้อมูล</div>';
        }

        auth.onAuthStateChanged(user => {
            if(user) {
                toggleModal('auth-ui', false); document.getElementById('game-ui').classList.remove('hidden');
                updateUIFromDB(user); resetGame();
            } else {
                toggleModal('auth-ui', true); document.getElementById('game-ui').classList.add('hidden');
            }
        });

        async function handleAuth(type) {
            const u = document.getElementById('login-user').value.trim();
            const p = document.getElementById('login-pass').value;
            if(u.length < 2 || p.length < 6) return alert("ชื่อ 2+ ตัว, รหัส 6+ ตัว");
            const email = btoa(unescape(encodeURIComponent(u))).substring(0,15).replace(/=/g, "") + "@typing.com";
            try {
                if(type === 'up') {
                    const res = await auth.createUserWithEmailAndPassword(email, p);
                    await db.collection("users").doc(res.user.uid).set({ name: u, xp: 0, photo: `https://api.dicebear.com/7.x/bottts/svg?seed=${res.user.uid}`, best: { th:{wpm:0,acc:0}, en:{wpm:0,acc:0} } });
                } else await auth.signInWithEmailAndPassword(email, p);
            } catch(e) { alert("ข้อมูลไม่ถูกต้อง"); }
        }

        window.addEventListener('keydown', (e) => { if(e.key === 'Escape') resetGame(); });
    </script>
</body>
</html>
