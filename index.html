<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typing Pro - Ultimate Elite 🏎️</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-storage-compat.js"></script>
    
    <style>
        :root { --primary: #2dd4bf; --secondary: #fb7185; --bg-gradient: linear-gradient(-45deg, #0f172a, #1e1b4b, #2d1b4d, #020617); --card-bg: rgba(30, 41, 59, 0.7); --text-main: #f1f5f9; --text-dim: #94a3b8; --input-bg: rgba(2, 6, 23, 0.6); --xp-color: #3b82f6; --border: rgba(255,255,255,0.1); }
        body { font-family: 'Kanit', sans-serif; background: var(--bg-gradient); color: var(--text-main); margin: 0; padding: 40px 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 850px; padding: 20px; }
        .card { background: var(--card-bg); backdrop-filter: blur(16px); border-radius: 32px; padding: 40px; border: 1px solid var(--border); position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .hidden { display: none !important; }
        .invisible-stats { opacity: 0; pointer-events: none; transform: scale(0.9); }

        .profile-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: rgba(0,0,0,0.2); padding: 15px 25px; border-radius: 24px; border: 1px solid var(--border); }
        .user-avatar { width: 50px; height: 50px; border-radius: 14px; border: 2px solid var(--primary); object-fit: cover; background: #000; }
        .xp-bar-bg { width: 100%; height: 8px; background: #000; border-radius: 10px; margin-top: 5px; overflow: hidden; }
        .xp-bar-fill { height: 100%; background: var(--xp-color); width: 0%; transition: 0.8s; }

        .mode-selector { display: flex; gap: 12px; margin-bottom: 20px; }
        .mode-btn { flex: 1; padding: 14px; background: var(--input-bg); border: 2px solid transparent; border-radius: 18px; cursor: pointer; color: var(--text-dim); transition: 0.3s; text-align: center; font-weight: bold; }
        .mode-btn.active { border-color: var(--primary); color: white; background: rgba(45, 212, 191, 0.1); box-shadow: 0 0 15px rgba(45, 212, 191, 0.2); }
        
        .word-display-container { font-size: 28px; padding: 25px; background: var(--input-bg); border-radius: 22px; margin-bottom: 20px; height: 100px; overflow: hidden; border: 2px solid var(--border); line-height: 1.6; }
        #word-list-wrapper { display: flex; flex-wrap: wrap; gap: 10px 20px; transition: 0.2s; }
        .word { color: var(--text-dim); }
        .word.active { color: var(--text-main); border-bottom: 3px solid var(--primary); }
        .word.correct { color: var(--primary); }
        .word.incorrect { color: var(--secondary); text-decoration: line-through; }

        .std-input { width: 100%; padding: 18px; border-radius: 18px; border: 2px solid var(--border); background: var(--input-bg); color: white; font-size: 20px; outline: none; box-sizing: border-box; text-align: center; transition: 0.3s; }
        .btn-reset { margin-top: 15px; width: 100%; padding: 14px; border-radius: 18px; border: none; background: linear-gradient(135deg, #1e293b, #334155); color: #94a3b8; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-reset:hover { color: white; transform: translateY(-2px); }
        .btn-p { background: var(--primary); color: #000; border: none; padding: 12px; border-radius: 15px; font-weight: bold; cursor: pointer; width: 100%; }

        .leaderboard-footer { margin-top: 35px; background: rgba(15, 23, 42, 0.4); border-radius: 24px; padding: 25px; border: 1px solid var(--border); }
        .lb-title { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; color: var(--primary); font-size: 18px; font-weight: bold; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .lb-scroll { max-height: 400px; overflow-y: auto; }
        .rank-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 18px; background: rgba(255,255,255,0.03); border-radius: 16px; margin-bottom: 10px; border: 1px solid transparent; }
        .rank-info { display: flex; align-items: center; gap: 15px; }
        .rank-img { width: 35px; height: 35px; border-radius: 10px; object-fit: cover; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(10px); }
        .modal-content { background: #1e293b; padding: 35px; border-radius: 30px; width: 420px; text-align: center; border: 1px solid var(--primary); }
        
        .icon-btn { cursor: pointer; background: var(--input-bg); border: 1px solid var(--border); padding: 10px; border-radius: 15px; transition: 0.3s; color: white; }
        .icon-btn:hover { background: rgba(255,255,255,0.1); }
    </style>
</head>
<body>

<div class="container">
    <div id="auth-ui" class="card">
        <h2 style="text-align: center; letter-spacing: 2px; color: var(--primary);">⌨️ TYPING PRO</h2>
        <input type="text" id="login-user" class="std-input" placeholder="ชื่อผู้ใช้" style="margin-bottom:15px;">
        <input type="password" id="login-pass" class="std-input" placeholder="รหัสผ่าน" style="margin-bottom:15px;">
        <button class="btn-p" onclick="handleAuth('in')">เข้าสู่ระบบ</button>
        <button onclick="handleAuth('up')" style="background:none; border:none; color:var(--text-dim); width:100%; margin-top:15px; cursor:pointer;">สมัครสมาชิกใหม่</button>
    </div>

    <div id="game-ui" class="card hidden">
        <div style="position: absolute; top: 25px; right: 25px; display: flex; gap: 10px;">
            <div class="icon-btn" onclick="toggleStatsVisibility()" title="เปิด/ปิด สถิติ">👁️</div>
            <div class="icon-btn" onclick="openSettings()">⚙️</div>
            <div class="icon-btn" onclick="auth.signOut()">🚪</div>
        </div>

        <div class="profile-bar">
            <div style="position:relative">
                <img id="display-avatar" class="user-avatar" src="">
                <span id="display-lvl-badge" style="position:absolute; bottom:-5px; right:-5px; background:var(--xp-color); font-size:10px; padding:2px 6px; border-radius:5px; font-weight:bold;">LV.1</span>
            </div>
            <div style="flex-grow:1; margin-left:20px;">
                <div id="display-name" style="font-weight:bold; color:var(--primary); font-size:18px;">User</div>
                <div class="xp-bar-bg"><div id="xp-fill" class="xp-bar-fill"></div></div>
                <small id="xp-text" style="font-size:11px; color:var(--text-dim);">0 XP</small>
            </div>
        </div>

        <div class="mode-selector">
            <div class="mode-btn active" id="btn-th" onclick="switchMode('th')">🇹🇭 ภาษาไทย</div>
            <div class="mode-btn" id="btn-en" onclick="switchMode('en')">🇺🇸 English</div>
            <div class="mode-btn" id="btn-race" onclick="openRaceLobby()">🏎️ โหมดปะลอง</div>
        </div>

        <div id="race-section" class="hidden" style="margin-bottom:20px; background:rgba(0,0,0,0.3); padding:20px; border-radius:20px;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <span id="room-id-display" style="color:var(--primary); font-weight:bold;">ROOM: -</span>
                <button class="btn-p" style="width:auto; padding:5px 20px;" onclick="triggerRaceStart()">เริ่มการแข่ง</button>
            </div>
            <div id="race-lanes"></div>
        </div>

        <div id="stats-panel" style="display:flex; justify-content:space-around; margin-bottom:20px; background:rgba(0,0,0,0.2); padding:15px; border-radius:20px; transition:0.3s;">
            <div style="text-align:center;"><small style="color:var(--text-dim)">TIME</small><div id="timer" style="font-size:24px; font-weight:bold; color:var(--secondary);">60s</div></div>
            <div style="text-align:center;"><small style="color:var(--text-dim)">WPM</small><div id="wpm-live" style="font-size:24px; font-weight:bold; color:var(--primary);">0</div></div>
            <div style="text-align:center;"><small style="color:var(--text-dim)">WRONG</small><div id="wrong-live" style="font-size:24px; font-weight:bold; color:var(--secondary);">0</div></div>
        </div>

        <div class="word-display-container"><div id="word-list-wrapper"></div></div>
        <input type="text" id="typing-input" class="std-input" placeholder="เริ่มพิมพ์ที่นี่..." autocomplete="off">
        
        <button class="btn-reset" onclick="resetGame()">↻ รีเซ็ตและสุ่มคำศัพท์ใหม่ (1,000 คำ)</button>

        <div class="leaderboard-footer">
            <div class="lb-title">
                <span>🏆 อันดับสูงสุด (TOP 1000)</span>
                <span id="lb-mode-name" style="font-size:14px; opacity:0.7;">ภาษาไทย</span>
            </div>
            <div class="lb-scroll" id="lb-list-main"></div>
        </div>
    </div>
</div>

<div id="settings-modal" class="modal hidden">
    <div class="modal-content">
        <h3>⚙️ ตั้งค่าโปรไฟล์</h3>
        <img id="settings-preview" class="user-avatar" style="width:100px; height:100px; margin-bottom:20px;" src="">
        <input type="file" id="avatar-upload" hidden onchange="handleFileSelect(this)">
        <div style="display:flex; gap:10px; margin-bottom:20px;">
            <button class="btn-p" style="background:#475569" onclick="document.getElementById('avatar-upload').click()">เลือกรูปภาพ</button>
            <button id="save-btn-ui" class="btn-p" onclick="saveSettings()">บันทึกข้อมูล</button>
        </div>
        <input type="text" id="settings-name" class="std-input" placeholder="เปลี่ยนชื่อเล่น">
        <button onclick="toggleModal('settings-modal', false)" style="margin-top:15px; background:none; border:none; color:white; cursor:pointer;">ยกเลิก</button>
    </div>
</div>

<div id="race-lobby-modal" class="modal hidden">
    <div class="modal-content">
        <h3>🏎️ โหมดปะลอง (100 คำ ไทยล้วน)</h3>
        <button class="btn-p" onclick="createRaceRoom()" style="margin-bottom:15px;">สร้างห้องใหม่</button>
        <input type="text" id="join-room-input" class="std-input" placeholder="รหัสห้อง">
        <button class="btn-p" onclick="joinRaceRoom()" style="margin-top:10px;">เข้าร่วมห้อง</button>
        <button onclick="toggleModal('race-lobby-modal', false)" style="margin-top:20px; background:none; border:none; color:white; cursor:pointer;">กลับ</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyC4lXsegdu_1H9coMKQNiPWj3Bg2sPxT-0",
        authDomain: "thaityping-5b95f.firebaseapp.com",
        projectId: "thaityping-5b95f",
        storageBucket: "thaityping-5b95f.appspot.com",
        messagingSenderId: "870492285903",
        appId: "1:870492285903:web:c85e1c878b6dc699f600ba"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.firestore(), storage = firebase.storage();

    const th_1 = ["กอ", "ขอ", "คอ", "งอ", "จอ", "ดอ", "ตอ", "บอ", "ปอ", "รอ", "ลอ", "วอ", "สอ", "หอ", "ออ", "กา", "มา", "นา", "ตา", "พา", "ลา", "หา", "ยา", "ฝา", "ทา", "รำ", "ทำ", "นำ", "จำ", "ดำ", "ดี", "ตี", "นี", "มี", "ปี", "รี", "สี", "ใจ", "ใน", "ไป", "ไว", "ใส", "ใฝ่", "ได้", "ให้", "ใช้", "คน", "มัน", "กิน", "นอน", "รัก", "ดู", "ปู", "หู", "รู้", "สู้", "กู้", "พบ", "จบ", "หลบ", "รบ", "ตบ", "นก", "ตก", "อก", "พก", "ยก", "กด", "จด", "ลด", "สด", "อด", "มด", "บน", "พ้น", "ต้น", "ทน", "ชน", "จน", "สน", "ลม", "ดม", "จม", "สม", "อม", "ผม", "พร", "จร", "สอน", "ตอน", "ขอน", "วอน", "ร้อน"];
    const th_2 = ["บ้านสวย", "ข้าวผัด", "น้ำดื่ม", "รถยนต์", "เรียนเก่ง", "เพื่อนรัก", "ป้าข้าง", "น้ายาย", "คุณแม่", "เราสอง", "ใครกัน", "เมื่อกี้", "แต่ว่า", "เพราะรัก", "ทำงาน", "เงินทอง", "รวยมาก", "แข็งแรง", "รวดเร็ว", "ความสุข", "ใจดี", "ไฟฟ้า", "หน้าตา", "ท้องฟ้า", "น้ำใจ", "หนังสือ", "ปากกา", "โต๊ะเรียน", "เก้าอี้"];
    const en_pool = ["the", "quick", "brown", "fox", "jumps", "over", "lazy", "dog", "coding", "typing", "speed", "test", "world", "future", "system", "logic", "create", "think", "build", "pixel", "power"];
    
    let currentMode = 'th', currentGameType = 'practice', isPlaying = false, statsVisible = true;
    let timer = null, timeLeft = 60, correctWords = 0, wrongWords = 0, currentWordIndex = 0, gameWords = [];
    let currentRoomId = null, roomUnsub = null;

    auth.onAuthStateChanged(user => {
        if(user) {
            document.getElementById('auth-ui').classList.add('hidden');
            document.getElementById('game-ui').classList.remove('hidden');
            syncUserData(user); loadLeaderboard(); resetGame();
        } else {
            document.getElementById('auth-ui').classList.remove('hidden');
            document.getElementById('game-ui').classList.add('hidden');
        }
    });

    async function handleAuth(type) {
        const u = document.getElementById('login-user').value.trim();
        const p = document.getElementById('login-pass').value;
        if(!u || p.length < 6) return alert("ข้อมูลไม่ครบ!");
        const email = btoa(unescape(encodeURIComponent(u))).replace(/=/g, "") + "@typing.com";
        try {
            if(type === 'up') {
                const res = await auth.createUserWithEmailAndPassword(email, p);
                const robotAvatar = `https://api.dicebear.com/7.x/bottts/svg?seed=${res.user.uid}`;
                await db.collection("users").doc(res.user.uid).set({ name: u, xp: 0, photo: robotAvatar, best: { th: 0, en: 0 } });
            } else await auth.signInWithEmailAndPassword(email, p);
        } catch(e) { alert("ชื่อผู้ใช้หรือรหัสผ่านผิด!"); }
    }

    async function syncUserData(user) {
        try {
            const doc = await db.collection("users").doc(user.uid).get();
            if(!doc.exists) return;
            const data = doc.data();
            document.getElementById('display-name').innerText = data.name || "User";
            document.getElementById('display-avatar').src = data.photo || "";
            const xp = data.xp || 0;
            const lv = Math.floor(Math.sqrt(xp / 5000)) + 1;
            document.getElementById('display-lvl-badge').innerText = `LV.${lv}`;
            document.getElementById('xp-fill').style.width = `${((xp % 5000) / 5000) * 100}%`;
            document.getElementById('xp-text').innerText = `${xp.toLocaleString()} XP`;
        } catch(e) { console.error("Sync fail", e); }
    }

    function generateWords() {
        const count = (currentGameType === 'race') ? 100 : 1000;
        let pool = [];
        if (currentMode === 'th') {
            for (let i = 0; i < count; i++) {
                let mod = i % 10;
                // สูตร: 8 คำแรก 1 พยางค์ : 2 คำหลัง 2 พยางค์
                if (mod >= 8) pool.push(th_2[Math.floor(Math.random() * th_2.length)]);
                else pool.push(th_1[Math.floor(Math.random() * th_1.length)]);
            }
        } else {
            for (let i = 0; i < count; i++) pool.push(en_pool[Math.floor(Math.random() * en_pool.length)]);
        }
        return pool;
    }

    function resetGame() {
        clearInterval(timer); isPlaying = false; timeLeft = 60;
        correctWords = 0; wrongWords = 0; currentWordIndex = 0;
        document.getElementById('timer').innerText = "60s";
        document.getElementById('wpm-live').innerText = "0";
        document.getElementById('wrong-live').innerText = "0";
        document.getElementById('typing-input').value = "";
        document.getElementById('typing-input').disabled = false;
        gameWords = generateWords();
        document.getElementById('word-list-wrapper').innerHTML = gameWords.map((w, i) => `<span class="word" id="w-${i}">${w}</span>`).join('');
        document.getElementById('word-list-wrapper').style.transform = `translateY(0px)`;
        updateHighlight();
    }

    function updateHighlight() {
        document.querySelectorAll('.word').forEach(el => el.classList.remove('active'));
        const cur = document.getElementById(`w-${currentWordIndex}`);
        if(cur) {
            cur.classList.add('active');
            if (cur.offsetTop > 45) document.getElementById('word-list-wrapper').style.transform = `translateY(-${cur.offsetTop - 10}px)`;
        }
    }

    document.getElementById('typing-input').addEventListener('input', (e) => {
        if(!isPlaying && e.target.value.trim().length > 0 && currentGameType === 'practice') { isPlaying = true; startTimer(); }
        if(e.target.value.endsWith(' ')) {
            const typed = e.target.value.trim();
            const el = document.getElementById(`w-${currentWordIndex}`);
            if(typed === gameWords[currentWordIndex]) { correctWords++; el.classList.add('correct'); }
            else { wrongWords++; el.classList.add('incorrect'); }
            currentWordIndex++; e.target.value = '';
            document.getElementById('wpm-live').innerText = correctWords;
            document.getElementById('wrong-live').innerText = wrongWords;
            updateHighlight();
            if(currentGameType === 'race') db.collection("rooms").doc(currentRoomId).update({ [`players.${auth.currentUser.uid}.progress`]: currentWordIndex / gameWords.length });
        }
    });

    function startTimer() { timer = setInterval(() => { timeLeft--; document.getElementById('timer').innerText = timeLeft + "s"; if(timeLeft <= 0) endGame(); }, 1000); }

    async function endGame() {
        isPlaying = false; clearInterval(timer);
        document.getElementById('typing-input').disabled = true;
        const user = auth.currentUser;
        if(user) {
            const ref = db.collection("users").doc(user.uid);
            const doc = await ref.get();
            const data = doc.data();
            let bests = data.best || { th: 0, en: 0 };
            
            if(currentGameType === 'practice' && correctWords > (bests[currentMode] || 0)) {
                bests[currentMode] = correctWords;
                await db.collection(`leaderboard_${currentMode}`).doc(user.uid).set({
                    name: data.name, wpm: correctWords, photo: data.photo
                }, {merge: true});
            }
            await ref.update({ xp: (data.xp || 0) + (correctWords * 2), best: bests });
            syncUserData(user); loadLeaderboard();
        }
        alert(`Finished! Score: ${correctWords} WPM`);
        resetGame();
    }

    async function loadLeaderboard() {
        const modeName = currentMode === 'th' ? "ภาษาไทย" : "English";
        document.getElementById('lb-mode-name').innerText = modeName;
        const snap = await db.collection(`leaderboard_${currentMode}`).orderBy("wpm", "desc").limit(1000).get();
        let html = ''; let r = 1;
        snap.forEach(doc => {
            const d = doc.data();
            html += `<div class="rank-item"><div class="rank-info"><span>${r++}</span><img src="${d.photo}" class="rank-img"><span>${d.name}</span></div><b>${d.wpm} WPM</b></div>`;
        });
        document.getElementById('lb-list-main').innerHTML = html || '<p style="text-align:center; opacity:0.3">No Data</p>';
    }

    function toggleStatsVisibility() {
        statsVisible = !statsVisible;
        document.getElementById('stats-panel').classList.toggle('invisible-stats', !statsVisible);
    }

    function switchMode(m) { 
        currentMode = m; currentGameType = 'practice'; 
        document.getElementById('race-section').classList.add('hidden'); 
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-${m}`).classList.add('active');
        if(roomUnsub) { roomUnsub(); roomUnsub = null; }
        resetGame(); loadLeaderboard(); 
    }

    function openRaceLobby() { toggleModal('race-lobby-modal', true); }
    async function createRaceRoom() {
        const rid = Math.random().toString(36).substring(7).toUpperCase();
        const rWords = [];
        for (let i = 0; i < 100; i++) {
            let mod = i % 10;
            if (mod >= 8) rWords.push(th_2[Math.floor(Math.random() * th_2.length)]);
            else rWords.push(th_1[Math.floor(Math.random() * th_1.length)]);
        }
        const u = auth.currentUser; const d = (await db.collection("users").doc(u.uid).get()).data();
        await db.collection("rooms").doc(rid).set({ status: 'waiting', words: rWords, players: { [u.uid]: { name: d.name, progress: 0, photo: d.photo } } });
        enterRace(rid);
    }

    async function joinRaceRoom() {
        const rid = document.getElementById('join-room-input').value.trim().toUpperCase();
        if(!rid) return;
        const u = auth.currentUser; const d = (await db.collection("users").doc(u.uid).get()).data();
        await db.collection("rooms").doc(rid).update({ [`players.${u.uid}`]: { name: d.name, progress: 0, photo: d.photo } });
        enterRace(rid);
    }

    function enterRace(rid) {
        currentRoomId = rid; currentGameType = 'race'; toggleModal('race-lobby-modal', false);
        document.getElementById('race-section').classList.remove('hidden');
        document.getElementById('room-id-display').innerText = `ROOM: ${rid}`;
        roomUnsub = db.collection("rooms").doc(rid).onSnapshot(doc => {
            const data = doc.data(); if(!data) return;
            document.getElementById('race-lanes').innerHTML = Object.keys(data.players).map(pid => `
                <div style="height:30px; border-bottom:1px dashed #444; position:relative; margin-top:5px;">
                    <div style="position:absolute; left:${data.players[pid].progress*90}%; transition:0.3s; font-size:12px; display:flex; align-items:center; gap:5px;">
                        <img src="${data.players[pid].photo}" style="width:18px; height:18px; border-radius:50%;"> 🏎️ ${data.players[pid].name}
                    </div>
                </div>`).join('');
            if(data.status === 'playing' && !isPlaying) { 
                gameWords = data.words; 
                document.getElementById('word-list-wrapper').innerHTML = gameWords.map((w, i) => `<span class="word" id="w-${i}">${w}</span>`).join('');
                isPlaying = true; startTimer(); 
            }
        });
    }

    async function triggerRaceStart() { await db.collection("rooms").doc(currentRoomId).update({ status: 'playing' }); }
    function toggleModal(id, s) { document.getElementById(id).classList.toggle('hidden', !s); }
    function openSettings() { toggleModal('settings-modal', true); document.getElementById('settings-preview').src = document.getElementById('display-avatar').src; }
    function handleFileSelect(i) { if(i.files[0]) { const r = new FileReader(); r.onload = (e) => document.getElementById('settings-preview').src = e.target.result; r.readAsDataURL(i.files[0]); } }

    async function saveSettings() {
        const saveBtn = document.getElementById('save-btn-ui');
        saveBtn.innerText = "กำลังบันทึก..."; saveBtn.disabled = true;
        const u = auth.currentUser;
        const newName = document.getElementById('settings-name').value.trim();
        const file = document.getElementById('avatar-upload').files[0];
        let url = document.getElementById('settings-preview').src;

        try {
            // 1. อัปโหลดรูปภาพ (ถ้ามีการเลือกใหม่)
            if(file) {
                const ref = storage.ref().child(`avatars/${u.uid}_${Date.now()}`);
                const task = await ref.put(file);
                url = await task.ref.getDownloadURL();
            }

            // 2. อัปเดตข้อมูลใน Firestore User Collection
            const updateObj = { photo: url };
            if(newName) updateObj.name = newName;
            await db.collection("users").doc(u.uid).update(updateObj);

            // 3. อัปเดตข้อมูลใน Leaderboard (ถ้าเคยมีชื่ออยู่)
            const lbRefTh = db.collection("leaderboard_th").doc(u.uid);
            const lbRefEn = db.collection("leaderboard_en").doc(u.uid);
            const [thDoc, enDoc] = await Promise.all([lbRefTh.get(), lbRefEn.get()]);
            
            let lbUpdates = [];
            if(thDoc.exists) lbUpdates.push(lbRefTh.update(updateObj));
            if(enDoc.exists) lbUpdates.push(lbRefEn.update(updateObj));
            await Promise.all(lbUpdates);

            await syncUserData(u);
            toggleModal('settings-modal', false);
            alert("บันทึกข้อมูลเรียบร้อย!");
        } catch(e) { 
            console.error(e);
            alert("บันทึกไม่สำเร็จ: ตรวจสอบการเชื่อมต่อหรือ Permission"); 
        }
        saveBtn.innerText = "บันทึกข้อมูล"; saveBtn.disabled = false;
    }
</script>
